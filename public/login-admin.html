<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل دخول الإدارة</title>
  <style>
    body{font-family:Arial,sans-serif;background:#0b1120;color:#fff;display:grid;place-items:center;min-height:100vh;margin:0}
    .box{width:min(420px,92vw);background:#111827;padding:24px;border-radius:16px}
    input{width:100%;padding:12px;margin:8px 0;border-radius:10px;border:1px solid #334155;background:#0f172a;color:#fff}
    button{width:100%;padding:12px;border:0;border-radius:10px;background:#22c55e;color:#04101f;font-weight:700;cursor:pointer}
    .msg{margin-top:10px;color:#93c5fd;white-space:pre-wrap}
  </style>
</head>
<body>
  <div class="box">
    <h2>تسجيل دخول الإدارة</h2>
    <input id="email" type="email" placeholder="Email" />
    <input id="password" type="password" placeholder="Password" />
    <button id="loginBtn">دخول</button>
    <div class="msg" id="msg"></div>
  </div>

  <script type="module">
    import { auth } from "./firebase-init.js";
    import { signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";

    const email = document.getElementById("email");
    const password = document.getElementById("password");
    const msg = document.getElementById("msg");
    const loginBtn = document.getElementById("loginBtn");

    onAuthStateChanged(auth, (user) => {
      if (user) location.href = "./admin.html";
    });

    loginBtn.addEventListener("click", async () => {
      msg.textContent = "جاري تسجيل الدخول...";
      try {
        await signInWithEmailAndPassword(auth, email.value.trim(), password.value);
        msg.textContent = "تم تسجيل الدخول";
        location.href = "./admin.html";
      } catch (err) {
        console.error(err);
        msg.textContent = "فشل تسجيل الدخول: " + err.message;
      }
    });
  </script>
</body>
</html>
