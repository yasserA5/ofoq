<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل الدخول</title>

  <link rel="icon" type="image/png" href="/public/logo1222.jpeg">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet" />

  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:'Tajawal',sans-serif;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
      background: linear-gradient(135deg,#f5f7fb 0%,#e2e8f0 100%);
    }
    .container{
      width:100%;
      max-width:420px;
      background:#fff;
      border:1px solid rgba(148,163,184,.25);
      border-radius:18px;
      padding:26px;
      box-shadow:0 18px 55px rgba(2,6,23,.12);
    }
    h2{margin:6px 0 10px;color:#0a4f5f;font-weight:800;font-size:26px}
    .subtitle{margin-bottom:16px;color:#64748b;font-size:13px;line-height:1.7}

    .message{
      display:none;
      margin-bottom:14px;
      padding:12px 16px;
      font-size:14px;
      border-radius:12px;
      font-weight:600;
      text-align:right;
    }
    .message.success{background:#10b981;color:#fff}
    .message.error{background:#ef4444;color:#fff}

    .input-box{position:relative;margin-bottom:14px}
    .base-icon{
      position:absolute;
      left:16px;
      top:50%;
      transform:translateY(-50%);
      font-size:18px;
      color:#94a3b8;
      pointer-events:none;
    }
    .input-box input{
      width:100%;
      padding:14px 16px 14px 48px;
      border:2px solid #e5e7eb;
      border-radius:14px;
      background:#f8fafc;
      outline:none;
      font-family:'Tajawal',sans-serif;
      font-size:15px;
    }
    .row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin:10px 0 16px;
      font-size:14px;
      color:#64748b;
      gap:10px;
    }
    .row a{color:#0aa2ca;text-decoration:none;font-weight:700}

    button{
      width:100%;
      padding:14px;
      border:none;
      border-radius:14px;
      font-size:16px;
      font-weight:800;
      cursor:pointer;
      font-family:'Tajawal',sans-serif;
    }
    .login-btn{
      background:linear-gradient(135deg,#0aa2ca,#078fa8);
      color:#fff;
    }
    .login-btn:disabled,
    .google-btn:disabled{
      opacity:.65;
      cursor:not-allowed;
    }

    .google-btn{
      width:100%;
      padding:14px 16px;
      border:2px solid #e5e7eb;
      border-radius:14px;
      font-size:15px;
      font-weight:800;
      cursor:pointer;
      font-family:'Tajawal',sans-serif;
      background:#fff;
      color:#0f172a;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
    }
    .google-btn:hover{
      background:#f8fafc;
      border-color:#cbd5e1;
    }
    .google-icon{
      width:20px;
      height:20px;
      display:inline-block;
      flex:0 0 20px;
    }

    .divider{
      display:flex;
      align-items:center;
      gap:10px;
      margin:14px 0;
      color:#94a3b8;
      font-size:13px;
      font-weight:700;
    }
    .divider::before,
    .divider::after{
      content:"";
      flex:1;
      height:1px;
      background:#e5e7eb;
    }

    .register-btn{
      width:100%;
      padding:14px;
      border:none;
      border-radius:14px;
      font-size:16px;
      font-weight:800;
      cursor:pointer;
      font-family:'Tajawal',sans-serif;
      background:#eef2ff;
      color:#0a4f5f;
    }
  </style>
</head>

<body>
  <div class="container">
    <h2>تسجيل الدخول</h2>
    <div class="subtitle">سجّل دخولك للوصول إلى المحتوى الكامل.</div>

    <div id="msg" class="message"></div>

    <div class="input-box">
      <i class="ri-mail-line base-icon"></i>
      <input id="email" type="email" placeholder="البريد الإلكتروني" autocomplete="email" required>
    </div>

    <div class="input-box">
      <i class="ri-lock-password-line base-icon"></i>
      <input id="password" type="password" placeholder="كلمة المرور" autocomplete="current-password" required>
    </div>

    <div class="row">
      <label><input id="remember" type="checkbox"> تذكرني</label>
      <a href="#" id="forgotLink">نسيت كلمة المرور؟</a>
    </div>

    <button class="login-btn" id="loginBtn" type="button">
      <span id="loginText">تسجيل الدخول</span>
      <span id="loginSpinner" style="display:none;">جاري...</span>
    </button>

    <div class="divider">أو</div>

    <button class="google-btn" id="googleLoginBtn" type="button">
      <svg class="google-icon" viewBox="0 0 24 24" aria-hidden="true">
        <path fill="#EA4335" d="M12 10.2v3.9h5.5c-.2 1.3-1.5 3.9-5.5 3.9-3.3 0-6-2.7-6-6s2.7-6 6-6c1.9 0 3.1.8 3.9 1.5l2.7-2.6C17 3.4 14.7 2.4 12 2.4 6.9 2.4 2.8 6.5 2.8 11.6S6.9 20.8 12 20.8c6.9 0 8.6-4.8 8.6-7.3 0-.5 0-.9-.1-1.3H12z"/>
        <path fill="#34A853" d="M3.8 7.7l3.2 2.3C7.9 8 9.8 6.6 12 6.6c1.9 0 3.1.8 3.9 1.5l2.7-2.6C17 3.4 14.7 2.4 12 2.4 8.4 2.4 5.3 4.5 3.8 7.7z"/>
        <path fill="#FBBC05" d="M12 20.8c2.6 0 4.8-.9 6.4-2.5l-3-2.4c-.8.6-1.9 1.1-3.4 1.1-3.9 0-5.2-2.6-5.5-3.8l-3.2 2.5c1.5 3.2 4.7 5.1 8.7 5.1z"/>
        <path fill="#4285F4" d="M20.6 12.2H12v3.9h5.5c-.3 1.4-1.4 2.5-2.9 3.3l3 2.4c1.8-1.7 2.9-4.1 2.9-7 0-.5 0-.9-.1-1.3z"/>
      </svg>
      <span>تسجيل الدخول باستخدام Google</span>
    </button>

    <div style="margin-top:12px;">
      <button
        type="button"
        class="register-btn"
        onclick="window.location.href='register.html'">
        إنشاء حساب
      </button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth,
      setPersistence,
      browserLocalPersistence,
      browserSessionPersistence,
      signInWithEmailAndPassword,
      signInWithPopup,
      GoogleAuthProvider
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// For Firebase JS SDK v7.20.0 and later, measurementId is optional
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyAl4BXeVtym6e4MYHQcfnThyted_mNIZPY",
  authDomain: "ofouq-academie.firebaseapp.com",
  projectId: "ofouq-academie",
  storageBucket: "ofouq-academie.firebasestorage.app",
  messagingSenderId: "479091527932",
  appId: "1:479091527932:web:379085d6bac81b61f30779",
  measurementId: "G-V69EP1BSDW"
};
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    const emailEl = document.getElementById("email");
    const passEl = document.getElementById("password");
    const rememberEl = document.getElementById("remember");
    const btn = document.getElementById("loginBtn");
    const googleBtn = document.getElementById("googleLoginBtn");

    function showMsg(text, type="success"){
      const msg = document.getElementById("msg");
      msg.className = "message " + type;
      msg.textContent = text;
      msg.style.display = "block";
      if(type === "success"){
        setTimeout(() => {
          msg.style.display = "none";
        }, 2200);
      }
    }

    function setLoading(v){
      btn.disabled = v;
      googleBtn.disabled = v;
      document.getElementById("loginText").style.display = v ? "none" : "inline";
      document.getElementById("loginSpinner").style.display = v ? "inline" : "none";
    }

    async function applyPersistence(){
      const persistence = rememberEl.checked
        ? browserLocalPersistence
        : browserSessionPersistence;
      await setPersistence(auth, persistence);
    }

    function saveUserData(user, providerName="password"){
      const userData = {
        provider: providerName,
        loggedIn: true,
        uid: user.uid,
        email: user.email || "",
        name: user.displayName || (user.email ? user.email.split("@")[0] : "User"),
        photoURL: user.photoURL || "",
        lastLogin: Date.now()
      };

      if (rememberEl.checked) {
        localStorage.setItem("user", JSON.stringify(userData));
        sessionStorage.removeItem("user");
      } else {
        sessionStorage.setItem("user", JSON.stringify(userData));
        localStorage.removeItem("user");
      }
    }

    function redirectAfterLogin(){
      const fromPage = sessionStorage.getItem("loginFrom") || "index.html";
      setTimeout(() => {
        window.location.href = fromPage;
      }, 700);
    }

    async function doLogin(){
      const email = emailEl.value.trim();
      const password = passEl.value.trim();

      if(!email || !password){
        return showMsg("أدخل البريد الإلكتروني وكلمة المرور.", "error");
      }

      try{
        setLoading(true);
        await applyPersistence();
        const cred = await signInWithEmailAndPassword(auth, email, password);
        saveUserData(cred.user, "password");
        showMsg("تم تسجيل الدخول بنجاح.", "success");
        redirectAfterLogin();
      }catch(error){
        let msg = "فشل تسجيل الدخول. تحقق من البيانات.";
        if (error.code === "auth/invalid-credential") msg = "البريد الإلكتروني أو كلمة المرور غير صحيحة.";
        if (error.code === "auth/user-not-found") msg = "هذا الحساب غير موجود.";
        if (error.code === "auth/wrong-password") msg = "كلمة المرور غير صحيحة.";
        if (error.code === "auth/too-many-requests") msg = "تمت محاولات كثيرة. حاول لاحقًا.";
        showMsg(msg, "error");
      }finally{
        setLoading(false);
      }
    }

async function doGoogleLogin(){
  try{
    setLoading(true);
    await applyPersistence();
    const result = await signInWithPopup(auth, provider);
    saveUserData(result.user, "google");
    showMsg("تم تسجيل الدخول عبر Google بنجاح.", "success");
    redirectAfterLogin();
  }catch(error){
    console.error("Google login error:", error);

    let msg = "تعذر تسجيل الدخول عبر Google.";
    if (error.code === "auth/popup-closed-by-user") msg = "أغلقت نافذة Google قبل إكمال تسجيل الدخول.";
    else if (error.code === "auth/popup-blocked") msg = "المتصفح حظر نافذة تسجيل الدخول. اسمح بالنوافذ المنبثقة.";
    else if (error.code === "auth/cancelled-popup-request") msg = "تم إلغاء طلب تسجيل الدخول المنبثق.";
    else if (error.code === "auth/unauthorized-domain") msg = "هذا الدومين غير مضاف في Firebase Authorized Domains.";
    else if (error.code === "auth/operation-not-allowed") msg = "تسجيل الدخول عبر Google غير مفعّل في Firebase.";
    else if (error.code === "auth/network-request-failed") msg = "فشل الاتصال بالشبكة أثناء تسجيل الدخول.";
    else if (error.code === "auth/invalid-api-key") msg = "Firebase API Key غير صحيحة.";
    else if (error.message) msg = error.code + " — " + error.message;

    showMsg(msg, "error");
  }finally{
    setLoading(false);
  }
}


    btn.addEventListener("click", doLogin);
    googleBtn.addEventListener("click", doGoogleLogin);

    document.addEventListener("keydown", (e) => {
      if(e.key === "Enter") doLogin();
    });

    document.getElementById("forgotLink").addEventListener("click", (e) => {
      e.preventDefault();
      showMsg("يمكنك إضافة صفحة استرجاع كلمة المرور لاحقًا عبر Firebase.", "success");
    });
  </script>
</body>
</html>
