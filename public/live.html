<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>البث المباشر - Ofouq Academy</titltle>

  /png" href="logo1222.jpegeg">
  //fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet" " />
  //cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet" />

  <style>
    :root{
      --accent:#f472b6;
      --accent2:#38bdf8;
      --bg1:#0f172a;
      --bg2:#1e293b;
      --card: rgba(30,41,59,.78);
      --text:#e5e7eb;
      --muted:#cbd5e1;
      --soft:#94a3b8;
      --border: rgba(148,163,184,.20);
      --shadow: 0 22px 60px rgba(2,6,23,.40);
    }

    *{ box-sizing:border-box; }
    html,body{ margin:0; padding:0; width:100%; overflow-x:hidden; }

    body{
      font-family:"Tajawal",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top right, rgba(244,114,182,.12), transparent 28%),
        radial-gradient(circle at top left, rgba(56,189,248,.10), transparent 30%),
        linear-gradient(180deg, #0f172a 0%, #111827 100%);
      min-height:100vh;
    }

    a{ color:inherit; text-decoration:none; }

    .wrap{
      width:min(1200px, calc(100% - 28px));
      margin:0 auto;
    }

    .hero{
      padding:26px 0 16px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:20px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
    }

    .brand img{
      width:52px;
      height:52px;
      object-fit:cover;
      border-radius:16px;
      box-shadow: var(--shadow);
    }

    .brand h1{
      margin:0;
      font-size:20px;
      color:#fff;
    }

    .brand p{
      margin:2px 0 0;
      font-size:13px;
      color:var(--soft);
    }

    .home-link{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 14px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(15,23,42,.55);
      color:#fff;
      font-weight:700;
    }

    .hero-card{
      background: linear-gradient(135deg, rgba(30,41,59,.82), rgba(15,23,42,.90));
      border:1px solid rgba(148,163,184,.16);
      border-radius:36px;
      box-shadow: var(--shadow);
      overflow:hidden;
      padding:16px;
    }

    .player-shell{
      background:#000;
      border-radius:28px;
      overflow:hidden;
      min-height:300px;
      aspect-ratio:16/9;
      width:100%;
      border:1px solid rgba(255,255,255,.06);
    }

    .player-shell iframe{
      width:100%;
      height:100%;
      display:block;
      border:0;
      background:#000;
    }

    .player-empty{
      width:100%;
      height:100%;
      min-height:300px;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      gap:10px;
      color:#cbd5e1;
      text-align:center;
      padding:24px;
    }

    .live-info{
      margin-top:18px;
      background: linear-gradient(135deg, rgba(51,65,85,.88), rgba(30,41,59,.88));
      border:1px solid rgba(148,163,184,.15);
      border-radius:28px;
      padding:22px;
    }

    .live-title{
      margin:0 0 10px;
      font-size:24px;
      color:#fff;
    }

    .live-desc{
      margin:0;
      font-size:18px;
      color:#dbe4f0;
      line-height:1.9;
    }

    .status-bar{
      margin-top:14px;
      text-align:center;
      color:#93c5fd;
      font-size:14px;
      min-height:22px;
    }

    @media (max-width: 900px){
      .live-title{ font-size:21px; }
      .live-desc{ font-size:16px; }
    }
  </style>
</head>
<body>
  <div class="wrap hero">
    <div class="topbar">
      <div class="brand">
        <img src="logo1222.jpeg" alt="Ofouq Academy">
        <div>
          <h1>Ofouq Academy</h1>
          <p>صفحة البث المباشر</p>
        </div>
      </div>

      <a class="home-link" href="index.html">
        <i class="ri-arrow-right-line"></i>
        العودة إلى الرئيسية
      </a>
    </div>

    <div class="hero-card">
      <div id="livePlayer" class="player-shell">
        <div class="player-empty">
          <i class="ri-live-line" style="font-size:42px;color:#f472b6;"></i>
          <div>جارٍ تحميل البث المباشر...</div>
        </div>
      </div>

      <div class="live-info">
        <h2 id="liveTitle" class="live-title">البث المباشر</h2>
        <p id="liveDesc" class="live-desc">سيظهر هنا وصف البث المباشر الحالي بمجرد إضافته من لوحة التحكم.</p>
      </div>

      <div id="statusBar" class="status-bar"></div>
    </div>
  </div>

  <script type="module">
    import { db } from "./firebase-init.js";
    import { collection, getDocs } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";

    const playerBox = document.getElementById("livePlayer");
    const titleEl = document.getElementById("liveTitle");
    const descEl = document.getElementById("liveDesc");
    const statusBar = document.getElementById("statusBar");

    function escapeHtml(value){
      return String(value ?? "").replace(/[&<>"']/g, m => ({
        "&":"&amp;",
        "<":"&lt;",
        ">":"&gt;",
        '"':"&quot;",
        "'":"&#039;"
      }[m]));
    }

    function getText(field){
      if (!field) return "";
      if (typeof field === "string") return field;
      return field.ar || field.fr || field.en || "";
    }

    function youtubeEmbedUrl(url) {
      if (!url) return "";

      url = url.trim();

      if (url.includes("youtube.com/watch?v=")) {
        const u = new URL(url);
        const id = u.searchParams.get("v");
        return id ? `https://www.youtube.com/embed/${id}?autoplay=1&mute=1&rel=0&playsinline=1` : "";
      }

      if (url.includes("youtu.be/")) {
        const id = url.split("youtu.be/")[1]?.split("?")[0];
        return id ? `https://www.youtube.com/embed/${id}?autoplay=1&mute=1&rel=0&playsinline=1` : "";
      }

      if (url.includes("youtube.com/embed/")) {
        return url.includes("?")
          ? `${url}&autoplay=1&mute=1&rel=0&playsinline=1`
          : `${url}?autoplay=1&mute=1&rel=0&playsinline=1`;
      }

      if (url.includes("/shorts/")) {
        const id = url.split("/shorts/")[1]?.split("?")[0];
        return id ? `https://www.youtube.com/embed/${id}?autoplay=1&mute=1&rel=0&playsinline=1` : "";
      }

      return "";
    }

    function renderEmpty(message){
      playerBox.innerHTML = `
        <div class="player-empty">
          <i class="ri-live-line" style="font-size:42px;color:#f472b6;"></i>
          <div>${escapeHtml(message)}</div>
        </div>
      `;
    }

    function renderPlayer(url) {
      const embedUrl = youtubeEmbedUrl(url);

      if (!embedUrl) {
        renderEmpty("رابط البث غير صالح. ضع رابط YouTube صحيح من لوحة التحكم.");
        statusBar.textContent = "يجب إدخال رابط YouTube فقط.";
        return;
      }

      playerBox.innerHTML = `
        <iframe
          src="${embedUrl}"
          title="YouTube Live Player"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          allowfullscreen>
        </iframe>
      `;
    }

    async function loadLivePage() {
      statusBar.textContent = "جارٍ تحميل البث من Firestore...";

      const snap = await getDocs(collection(db, "content"));
      const liveItems = [];

      snap.forEach(docSnap => {
        const data = docSnap.data();
        if (data.section === "live") {
          liveItems.push({
            id: docSnap.id,
            ...data
          });
        }
      });

      liveItems.sort((a, b) => Number(b.updatedAt || b.createdAt || 0) - Number(a.updatedAt || a.createdAt || 0));

      if (!liveItems.length) {
        titleEl.textContent = "لا يوجد بث مباشر";
        descEl.textContent = "سيظهر هنا وصف البث المباشر الحالي بمجرد إضافته من لوحة التحكم.";
        renderEmpty("لا يوجد بث مباشر الآن");
        statusBar.textContent = "لم يتم العثور على أي عنصر في قسم البث المباشر.";
        return;
      }

      const current = liveItems[0];
      titleEl.textContent = getText(current.title) || "بث مباشر";
      descEl.textContent = getText(current.short) || " ";
      renderPlayer(current.file || "");
      statusBar.textContent = "تم تحميل البث المباشر بنجاح.";
    }

    loadLivePage().catch(error => {
      console.error("Live page error:", error);
      titleEl.textContent = "تعذر تحميل البث";
      descEl.textContent = "حدث خطأ أثناء قراءة بيانات البث المباشر.";
      renderEmpty("تعذر تحميل مشغل البث المباشر");
      statusBar.textContent = "حدث خطأ أثناء الاتصال بـ Firestore.";
    });
  </script>
</body>
</html>
