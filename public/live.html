<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>البث المباشر - Ofouq Academy</titltle>

  /png" href="logo1222.jpeg">
  //fonts.googleapis.com">
  //fonts.gstatic.com" crossorigigin>
  //fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheetet">
  //cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">

  <style>
    :root{
      --bg1:#0f172a;
      --bg2:#111827;
      --card:rgba(15,23,42,.82);
      --card-2:rgba(30,41,59,.88);
      --text:#e5e7eb;
      --muted:#94a3b8;
      --line:rgba(148,163,184,.18);
      --pink:#f472b6;
      --blue:#38bdf8;
      --shadow:0 22px 60px rgba(2,6,23,.42);
      --r:28px;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      padding:0;
      width:100%;
      overflow-x:hidden;
    }

    body{
      font-family:"Tajawal",sans-serif;
      color:var(--text);
      min-height:100vh;
      background:
        radial-gradient(circle at top right, rgba(244,114,182,.10), transparent 24%),
        radial-gradient(circle at top left, rgba(56,189,248,.08), transparent 26%),
        linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 100%);
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    .container{
      width:min(1180px, calc(100% - 24px));
      margin:0 auto;
      padding:24px 0 40px;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      flex-wrap:wrap;
      margin-bottom:18px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
    }

    .brand img{
      width:54px;
      height:54px;
      object-fit:cover;
      border-radius:16px;
      box-shadow:var(--shadow);
    }

    .brand h1{
      margin:0;
      font-size:20px;
      color:#fff;
    }

    .brand p{
      margin:4px 0 0;
      font-size:13px;
      color:var(--muted);
    }

    .back-btn{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 16px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(15,23,42,.55);
      color:#fff;
      font-weight:800;
    }

    .hero{
      background:linear-gradient(135deg, rgba(30,41,59,.84), rgba(15,23,42,.92));
      border:1px solid var(--line);
      border-radius:36px;
      box-shadow:var(--shadow);
      padding:16px;
      overflow:hidden;
    }

    .player-wrap{
      width:100%;
      aspect-ratio:16/9;
      min-height:280px;
      background:#000;
      border-radius:24px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.06);
    }

    .player-wrap iframe{
      width:100%;
      height:100%;
      border:0;
      display:block;
      background:#000;
    }

    .empty{
      width:100%;
      height:100%;
      min-height:280px;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      gap:10px;
      padding:22px;
      text-align:center;
      color:#dbe4f0;
      background:linear-gradient(180deg, rgba(2,6,23,.78), rgba(15,23,42,.92));
    }

    .empty i{
      font-size:44px;
      color:var(--pink);
    }

    .info{
      margin-top:18px;
      padding:22px;
      border-radius:24px;
      border:1px solid var(--line);
      background:linear-gradient(135deg, rgba(51,65,85,.9), rgba(30,41,59,.9));
    }

    .live-badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 14px;
      border-radius:999px;
      background:rgba(131,24,67,.35);
      color:#ffd4e8;
      border:1px solid rgba(244,114,182,.22);
      font-size:13px;
      font-weight:800;
      margin-bottom:12px;
    }

    .title{
      margin:0 0 10px;
      font-size:26px;
      color:#fff;
      line-height:1.4;
    }

    .desc{
      margin:0;
      color:#dbe4f0;
      line-height:1.9;
      font-size:17px;
    }

    .meta{
      margin-top:16px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .meta a{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 14px;
      border-radius:999px;
      font-size:13px;
      font-weight:800;
      background:rgba(8,47,73,.35);
      color:#d7f1ff;
      border:1px solid rgba(56,189,248,.24);
    }

    .status{
      margin-top:14px;
      min-height:22px;
      text-align:center;
      color:#93c5fd;
      font-size:14px;
    }

    .note{
      margin-top:24px;
      padding:16px 18px;
      border-radius:20px;
      background:rgba(15,23,42,.55);
      border:1px solid var(--line);
      color:#cbd5e1;
      font-size:14px;
      line-height:1.8;
    }

    @media (max-width:900px){
      .title{ font-size:22px; }
      .desc{ font-size:16px; }
      .container{ width:min(100%, calc(100% - 18px)); }
      .hero{ border-radius:28px; }
      .player-wrap{ border-radius:18px; }
      .info{ border-radius:18px; padding:18px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="brand">
        <img src="logo1222.jpeg" alt="Ofouq Academy">
        <div>
          <h1>Ofouq Academy</h1>
          <p>صفحة البث المباشر</p>
        </div>
      </div>

      <a href="index.html" class="back-btn">
        <i class="ri-arrow-right-line"></i>
        العودة إلى الرئيسية
      </a>
    </div>

    <section class="hero">
      <div id="livePlayer" class="player-wrap">
        <div class="empty">
          <i class="ri-live-line"></i>
          <div>جارٍ تحميل البث المباشر...</div>
        </div>
      </div>

      <div class="info">
        <div class="live-badge">
          <i class="ri-broadcast-line"></i>
          مباشر الآن
        </div>

        <h2 id="liveTitle" class="title">البث المباشر</h2>
        <p id="liveDesc" class="desc">سيظهر هنا وصف البث المباشر الحالي بمجرد إضافته من لوحة التحكم.</p>

        <div class="meta">
          <a id="youtubeBtn" href="#" target="_blank" rel="noopener" style="display:none;">
            <i class="ri-youtube-fill"></i>
            فتح على يوتيوب
          </a>
        </div>

        <div id="statusBar" class="status"></div>
      </div>

      <div class="note">
        استخدم في لوحة التحكم رابط YouTube فقط، مثل رابط watch أو youtu.be أو embed، وسيتم تحويله تلقائياً إلى مشغل مناسب داخل الصفحة. [web:160]
      </div>
    </section>
  </div>

  <script type="module">
    import { db } from "./firebase-init.js";
    import { collection, getDocs } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";

    const playerBox = document.getElementById("livePlayer");
    const titleEl = document.getElementById("liveTitle");
    const descEl = document.getElementById("liveDesc");
    const statusBar = document.getElementById("statusBar");
    const youtubeBtn = document.getElementById("youtubeBtn");

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, function(m){
        return {
          "&":"&amp;",
          "<":"&lt;",
          ">":"&gt;",
          '"':"&quot;",
          "'":"&#039;"
        }[m];
      });
    }

    function getText(field) {
      if (!field) return "";
      if (typeof field === "string") return field;
      return field.ar || field.fr || field.en || "";
    }

    function extractYouTubeId(url) {
      if (!url) return "";
      const clean = String(url).trim();

      try {
        if (clean.includes("youtube.com/watch")) {
          const u = new URL(clean);
          return u.searchParams.get("v") || "";
        }

        if (clean.includes("youtu.be/")) {
          return clean.split("youtu.be/")[1]?.split(/[?&/]/)[0] || "";
        }

        if (clean.includes("youtube.com/embed/")) {
          return clean.split("youtube.com/embed/")[1]?.split(/[?&/]/)[0] || "";
        }

        if (clean.includes("youtube.com/shorts/")) {
          return clean.split("youtube.com/shorts/")[1]?.split(/[?&/]/)[0] || "";
        }
      } catch (e) {
        return "";
      }

      return "";
    }

    function buildEmbedUrl(url) {
      const id = extractYouTubeId(url);
      if (!id) return "";
      return "https://www.youtube.com/embed/" + id + "?autoplay=1&mute=1&rel=0&playsinline=1";
    }

    function renderEmpty(message) {
      playerBox.innerHTML =
        '<div class="empty">' +
          '<i class="ri-live-line"></i>' +
          '<div>' + escapeHtml(message) + '</div>' +
        '</div>';
    }

    function renderPlayer(sourceUrl) {
      const embedUrl = buildEmbedUrl(sourceUrl);

      if (!embedUrl) {
        renderEmpty("رابط البث غير صالح. أدخل رابط YouTube صحيح من لوحة التحكم.");
        statusBar.textContent = "الرابط الحالي ليس رابط YouTube صالحاً.";
        youtubeBtn.style.display = "none";
        return;
      }

      playerBox.innerHTML =
        '<iframe ' +
          'src="' + embedUrl + '" ' +
          'title="YouTube Live Player" ' +
          'allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" ' +
          'allowfullscreen>' +
        '</iframe>';

      youtubeBtn.href = sourceUrl;
      youtubeBtn.style.display = "inline-flex";
    }

    async function loadLivePage() {
      statusBar.textContent = "جارٍ تحميل البث من Firestore...";

      const snap = await getDocs(collection(db, "content"));
      const liveItems = [];

      snap.forEach(function(docSnap) {
        const data = docSnap.data();
        if (data.section === "live") {
          liveItems.push({
            id: docSnap.id,
            ...data
          });
        }
      });

      liveItems.sort(function(a, b) {
        return Number(b.updatedAt || b.createdAt || 0) - Number(a.updatedAt || a.createdAt || 0);
      });

      if (!liveItems.length) {
        titleEl.textContent = "لا يوجد بث مباشر";
        descEl.textContent = "سيظهر هنا وصف البث المباشر الحالي بمجرد إضافته من لوحة التحكم.";
        renderEmpty("لا يوجد بث مباشر الآن");
        statusBar.textContent = "لم يتم العثور على أي عنصر في قسم البث المباشر.";
        youtubeBtn.style.display = "none";
        return;
      }

      const current = liveItems[0];
      const title = getText(current.title) || "بث مباشر";
      const desc = getText(current.short) || " ";

      titleEl.textContent = title;
      descEl.textContent = desc;

      renderPlayer(current.file || "");
      if (buildEmbedUrl(current.file || "")) {
        statusBar.textContent = "تم تحميل البث المباشر بنجاح.";
      }
    }

    loadLivePage().catch(function(error) {
      console.error("Live page error:", error);
      titleEl.textContent = "تعذر تحميل البث";
      descEl.textContent = "حدث خطأ أثناء قراءة بيانات البث المباشر.";
      renderEmpty("تعذر تحميل مشغل البث المباشر");
      statusBar.textContent = "حدث خطأ أثناء الاتصال بـ Firestore.";
      youtubeBtn.style.display = "none";
    });
  </script>
</body>
</html>
