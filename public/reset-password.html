<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>إعادة تعيين كلمة المرور</title>
  <link rel="icon" type="image/png" href="/public/logo1222.jpeg">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width: 100%; overflow-x: hidden; }

    body {
      font-family: "Tajawal", sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #1e293b;
      line-height: 1.7;
      min-height: 100vh;
    }

    /* HEADER */
    header {
      padding: clamp(12px,3vw,18px) clamp(20px,5vw,30px);
      display:flex;
      align-items:center;
      justify-content:space-between;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(20px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
      position: sticky;
      top: 0;
      z-index: 999;
    }

    .logo {
      position: relative;
      flex: 1;
      display: flex;
      justify-content: center;
      cursor: pointer;
    }
    .logo img {
      width: clamp(60px,12vw,85px);
      height: auto;
      transition: transform 0.2s ease;
    }
    .logo img:hover,
    .logo img:active {
      transform: scale(1.05);
    }

    nav { display: none; }
    .actions { display: none; }

    #menu-btn {
      display: none;
      font-size: clamp(24px,6vw,30px);
      cursor: pointer;
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(102,126,234,0.2);
      border-radius: 50%;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1001;
      border: none;
      color: #fff;
    }

    .mobile-menu {
      display: none;
      position: fixed;
      top: 0;
      right: 0;
      width: min(80%,350px);
      height: 100%;
      background: rgba(255,255,255,0.98);
      backdrop-filter: blur(20px);
      box-shadow: -3px 0 12px rgba(0,0,0,0.3);
      padding: clamp(20px,8vw,30px);
      z-index: 2000;
      overflow-y: auto;
    }
    .mobile-menu ul { list-style: none; margin-top: 20px; }
    .mobile-menu ul li { margin-bottom: 18px; }
    .mobile-menu ul li a {
      font-size: clamp(18px,5vw,20px);
      text-decoration: none;
      color: #1e293b;
    }

    .reset-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(20px,5vw,40px);
    }

    .reset-card {
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: clamp(40px,10vw,60px);
      box-shadow: 0 25px 50px rgba(0,0,0,0.15);
      border: 1px solid rgba(255,255,255,0.2);
      max-width: 450px;
      width: 100%;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .reset-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #667eea, #764ba2);
    }

    .reset-icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 32px;
      color: white;
      box-shadow: 0 10px 30px rgba(102,126,234,0.4);
    }

    .reset-card h1 {
      font-size: clamp(24px,6vw,32px);
      font-weight: 800;
      color: #1e293b;
      margin-bottom: 12px;
    }

    .reset-card p {
      color: #64748b;
      font-size: clamp(14px,4vw,16px);
      margin-bottom: 32px;
      line-height: 1.6;
    }

    .reset-form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .form-field {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-size: 14px;
      font-weight: 600;
      color: #374151;
    }

    input {
      padding: 14px 18px;
      border: 2px solid #e5e7eb;
      border-radius: 14px;
      font-size: 16px;
      font-family: inherit;
      background: #fafbfc;
      transition: all 0.3s ease;
      color: #1e293b;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 4px rgba(102,126,234,0.1);
      background: #fff;
      transform: translateY(-1px);
    }

    .password-strength {
      height: 4px;
      border-radius: 2px;
      background: #e5e7eb;
      overflow: hidden;
      margin-top: 8px;
    }

    .strength-bar {
      height: 100%;
      transition: all 0.3s ease;
      border-radius: 2px;
    }

    .strength-weak { background: #ef4444; width: 25%; }
    .strength-fair { background: #f59e0b; width: 50%; }
    .strength-good { background: #10b981; width: 75%; }
    .strength-strong { background: #3b82f6; width: 100%; }

    .strength-text {
      font-size: 12px;
      margin-top: 4px;
      font-weight: 500;
    }

    .weak { color: #ef4444; }
    .fair { color: #f59e0b; }
    .good { color: #10b981; }
    .strong { color: #3b82f6; }

    .error-text {
      color: #ef4444;
      font-size: 12px;
      margin-top: 4px;
      display: none;
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 8px;
    }

    .btn {
      padding: clamp(14px,4vw,16px) clamp(24px,6vw,32px);
      border-radius: 14px;
      border: none;
      font-weight: 700;
      font-size: clamp(15px,4vw,16px);
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      box-shadow: 0 10px 25px rgba(102,126,234,0.4);
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 15px 35px rgba(102,126,234,0.5);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.7);
      color: #1e293b;
      border: 2px solid rgba(255,255,255,0.5);
    }

    .btn-secondary:hover {
      background: white;
      transform: translateY(-1px);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none !important;
    }

    .success-state {
      display: none;
      text-align: center;
      padding: 40px;
    }

    .success-icon {
      width: 72px;
      height: 72px;
      background: #10b981;
      border-radius: 50%;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: white;
    }

    .toast-container {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 5000;
    }
    .toast {
      background: rgba(255,255,255,0.95);
      padding: clamp(12px,3vw,16px) clamp(16px,4vw,20px);
      border-radius: 12px;
      margin-bottom: 10px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
      display: flex;
      align-items: center;
      gap: 12px;
      animation: slideIn 0.3s ease-in-out;
      max-width: 90vw;
      backdrop-filter: blur(10px);
    }
    .toast.success { border-right: 4px solid #10b981; }
    .toast.error { border-right: 4px solid #ef4444; }
    .toast-icon { font-size: clamp(18px,5vw,20px); }
    .toast-message {
      color: #1e293b;
      font-weight: 500;
      font-size: clamp(14px,3.5vw,16px);
    }

    @keyframes slideIn {
      from { transform: translateX(-100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideOut {
      from { transform: translateX(0); opacity: 1; }
      to { transform: translateX(-100%); opacity: 0; }
    }
    .toast.removing { animation: slideOut 0.3s ease-in-out; }

    @media(max-width: 980px){
      #menu-btn { display: flex !important; }
      header { justify-content: center; }
      .logo { position: static; flex: none; }
      .toast-container { left: 50%; transform: translateX(-50%); width: 90%; }
    }

    @media(max-width: 480px){
      .reset-card { margin: 20px; padding: 32px 24px; }
    }
  </style>
</head>

<body>
<!-- MOBILE MENU -->
<div class="mobile-menu" id="mobileMenu">
  <img src="public/logo1.png" style="width: clamp(65px,15vw,80px); margin-bottom: 20px;">
  <ul>
    <li><a href="index.html">الرئيسية</a></li>
    <li><a href="login.html">تسجيل الدخول</a></li>
    <li><a href="register.html">انضم إلينا</a></li>
    <li><a href="contact.html">اتصل بنا</a></li>
  </ul>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<header>
  <div id="menu-btn" onclick="toggleMenu()">☰</div>
  <div class="logo" onclick="goToHome()">
    <img src="/public/logo1.png"" alt="Logo">
  </div>
</header>

<div class="reset-container">
  <div class="reset-card">
    <!-- ICON -->
    <div class="reset-icon">🔒</div>

    <!-- FORM - NEW PASSWORD ONLY -->
    <h1>كلمة مرور جديدة</h1>
    <p>أدخل البريد الإلكتروني ثم كلمة المرور الجديدة</p>

    <form class="reset-form" id="resetPasswordForm">
      <div class="form-field">
        <label>البريد الإلكتروني *</label>
        <input type="email" id="resetEmail" placeholder="example@mail.com" required>
        <div class="error-text" id="emailError" style="display:none;">بريد إلكتروني غير صحيح</div>
      </div>

      <div class="form-field">
        <label>كلمة المرور الجديدة *</label>
        <input type="password" id="newPassword" placeholder="كلمة مرور قوية (8+ أحرف)" required minlength="8">
        <div class="password-strength">
          <div class="strength-bar"></div>
        </div>
        <div class="strength-text"></div>
      </div>

      <div class="form-field">
        <label>تأكيد كلمة المرور *</label>
        <input type="password" id="confirmPassword" placeholder="تأكيد كلمة المرور" required minlength="8">
        <div class="error-text" id="passwordMatchError" style="display:none;">كلمات المرور غير متطابقة</div>
      </div>

      <div class="btn-group">
        <button type="submit" class="btn btn-primary" id="submitBtn">
          <span id="btnText">تحديث كلمة المرور</span>
          <span id="btnSpinner" style="display:none;">⏳ جاري التحديث</span>
          <span>🔄</span>
        </button>
        <a href="login.html" class="btn btn-secondary">العودة لتسجيل الدخول</a>
      </div>
    </form>

    <!-- SUCCESS STATE -->
    <div class="success-state" id="successState" style="display:none;">
      <div class="success-icon">✅</div>
      <h1>تم التحديث!</h1>
      <p>تم تحديث كلمة المرور بنجاح للبريد: <strong id="successEmail"></strong></p>
      <div class="btn-group">
        <a href="login.html" class="btn btn-primary">تسجيل الدخول الآن</a>
        <button class="btn btn-secondary" onclick="resetForm()">تحديث حساب آخر</button>
      </div>
    </div>
  </div>
</div>

<script>
  // 🔥 الشعار → الرئيسية
  function goToHome() {
    window.location.href = 'index.html';
  }

  function toggleMenu() {
    const menu = document.getElementById("mobileMenu");
    menu.style.display = menu.style.display === "block" ? "none" : "block";
  }

  function showToast(message, type = 'success') {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    const icons = { success: '✅', error: '❌', info: 'ℹ️' };
    toast.innerHTML = `
      <span class="toast-icon">${icons[type] || 'ℹ️'}</span>
      <span class="toast-message">${message}</span>
    `;
    container.appendChild(toast);
    setTimeout(() => {
      toast.classList.add('removing');
      setTimeout(() => toast.remove(), 300);
    }, 4000);
  }

  function resetForm() {
    document.getElementById('resetPasswordForm').style.display = 'block';
    document.getElementById('successState').style.display = 'none';
    document.getElementById('resetPasswordForm').reset();
    document.getElementById('passwordMatchError').style.display = 'none';
    document.getElementById('emailError').style.display = 'none';
  }

  // Elements
  const emailField = document.getElementById('resetEmail');
  const passwordField = document.getElementById('newPassword');
  const confirmPasswordField = document.getElementById('confirmPassword');
  const emailError = document.getElementById('emailError');
  const passwordMatchError = document.getElementById('passwordMatchError');
  const strengthBar = document.querySelector('.strength-bar');
  const strengthText = document.querySelector('.strength-text');

  // Email validation
  emailField.addEventListener('input', function() {
    const email = this.value.trim();
    if (email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      emailError.style.display = 'block';
    } else {
      emailError.style.display = 'none';
    }
  });

  // Password strength
  passwordField.addEventListener('input', function() {
    const password = this.value;
    const length = password.length;
    const hasNumbers = /\d/.test(password);
    const hasUpper = /[A-Z\u00A0-\uD7FF\uF900-\uFDCF\uFDF0-\uFFEF]/.test(password);
    const hasLower = /[a-z\u0621-\u064A]/.test(password);
    const hasSpecial = /[!@#$%^&*(),.?":{}|<>]/.test(password);

    let strength = 0;
    if (length >= 8) strength++;
    if (hasNumbers) strength++;
    if (hasUpper && hasLower) strength++;
    if (hasSpecial) strength++;

    strengthBar.className = 'strength-bar';
    
    if (strength <= 1) {
      strengthBar.classList.add('strength-weak');
      strengthText.textContent = 'ضعيف';
      strengthText.className = 'strength-text weak';
    } else if (strength <= 2) {
      strengthBar.classList.add('strength-fair');
      strengthText.textContent = 'متوسط';
      strengthText.className = 'strength-text fair';
    } else if (strength <= 3) {
      strengthBar.classList.add('strength-good');
      strengthText.textContent = 'جيد';
      strengthText.className = 'strength-text good';
    } else {
      strengthBar.classList.add('strength-strong');
      strengthText.textContent = 'قوي جداً';
      strengthText.className = 'strength-text strong';
    }
  });

  // Password match
  confirmPasswordField.addEventListener('input', function() {
    const newPass = passwordField.value;
    const confirmPass = this.value;
    if (newPass !== confirmPass) {
      passwordMatchError.style.display = 'block';
    } else {
      passwordMatchError.style.display = 'none';
    }
  });

  // 🔥 FORM SUBMIT - UPDATE PASSWORD ONLY
  const form = document.getElementById('resetPasswordForm');
  const submitBtn = document.getElementById('submitBtn');
  const btnText = document.getElementById('btnText');
  const btnSpinner = document.getElementById('btnSpinner');

  form.addEventListener('submit', function(e) {
    e.preventDefault();

    const email = emailField.value.trim();
    const newPassword = passwordField.value;
    const confirmPassword = confirmPasswordField.value;

    // Validation
    let valid = true;
    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      emailError.style.display = 'block';
      valid = false;
    }
    if (!newPassword || newPassword.length < 8) {
      showToast('كلمة المرور يجب أن تكون 8 أحرف على الأقل', 'error');
      valid = false;
    }
    if (newPassword !== confirmPassword) {
      passwordMatchError.style.display = 'block';
      showToast('كلمات المرور غير متطابقة', 'error');
      valid = false;
    }

    if (!valid) return;

    // Loading
    submitBtn.disabled = true;
    btnText.style.display = 'none';
    btnSpinner.style.display = 'inline';

    setTimeout(() => {
      // 🔥 UPDATE PASSWORD ONLY - لا ينشئ حساب جديد
      let users = JSON.parse(localStorage.getItem('users') || '[]');
      const encodedPassword = btoa(newPassword);
      
      // 🔥 البحث بالبريد الإلكتروني فقط
      const userIndex = users.findIndex(u => u.email === email);
      
      if (userIndex > -1) {
        // 🔥 تحديث كلمة المرور فقط
        users[userIndex].password = encodedPassword;
        localStorage.setItem('users', JSON.stringify(users));
        
        // 🔥 تحديث الجلسة الحالية إن وجدت
        const currentUser = JSON.parse(localStorage.getItem('user') || '{}');
        if (currentUser.email === email) {
          currentUser.password = encodedPassword;
          localStorage.setItem('user', JSON.stringify(currentUser));
        }
        
        showToast(`تم تحديث كلمة مرور ${email} بنجاح!`, 'success');
      } else {
        // لا ينشئ حساب جديد - خطأ فقط
        showToast(`لا يوجد حساب لهذا البريد: ${email}`, 'error');
        submitBtn.disabled = false;
        btnText.style.display = 'inline';
        btnSpinner.style.display = 'none';
        return;
      }

      // Success state
      document.getElementById('successEmail').textContent = email;
      document.getElementById('resetPasswordForm').style.display = 'none';
      document.getElementById('successState').style.display = 'block';

      submitBtn.disabled = false;
      btnText.style.display = 'inline';
      btnSpinner.style.display = 'none';
    }, 1500);
  });

  // Debug
  console.log('Current users:', JSON.parse(localStorage.getItem('users') || '[]'));
</script>

</body>
</html>
