<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة التحكم - Ofouq Academy</title>

  <link rel="icon" type="image/png" href="logo1222.jpeg">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet" />

  <style>
    :root{
      --accent:#0ea5e9;
      --accent2:#22c55e;
      --bg1:#020617;
      --bg2:#0b1120;
      --card: rgba(15,23,42,.86);
      --card2: rgba(15,23,42,.92);
      --text:#e5e7eb;
      --muted:#94a3b8;
      --border: rgba(148,163,184,.26);
      --danger:#ef4444;
      --shadow: 0 18px 45px rgba(15,23,42,.65);
      --r:18px;
      --t: .18s ease;
    }
    *{ box-sizing:border-box; }
    html,body{ width:100%; overflow-x:hidden; }
    body{
      margin:0;
      font-family:"Tajawal",sans-serif;
      background: radial-gradient(circle at top left, var(--bg2) 0%, var(--bg1) 55%, #000 100%);
      color:var(--text);
      line-height:1.65;
      -webkit-font-smoothing:antialiased;
    }

    /* Login overlay */
    .lock{
      position:fixed; inset:0;
      display:flex; align-items:center; justify-content:center;
      padding:18px;
      background: radial-gradient(circle at top, #0f172a 0%, #020617 55%, #000 100%);
      z-index:9999;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      transition: opacity .24s ease, visibility .24s ease;
    }
    .lock.hidden{ opacity:0; visibility:hidden; }
    .lock-card{
      width:min(420px, 100%);
      background: linear-gradient(135deg, rgba(15,23,42,.94), rgba(15,23,42,.76));
      border:1px solid rgba(148,163,184,.38);
      border-radius:22px;
      box-shadow: var(--shadow);
      padding:22px 18px 18px;
      position:relative;
      overflow:hidden;
    }
    .lock-card:before{
      content:"";
      position:absolute;
      width:180px; height:180px;
      top:-70px; left:-60px;
      background: radial-gradient(circle, rgba(56,189,248,.35), transparent 60%);
      opacity:.9;
      pointer-events:none;
    }
    .lock-title{
      margin:0 0 6px;
      font-size:20px;
      display:flex; align-items:center; gap:8px;
      color:#e0f2fe;
    }
    .lock-title i{ color:#38bdf8; font-size:22px; }
    .lock-desc{
      margin:0 0 16px;
      color:var(--muted);
      font-size:13px;
    }
    .in{
      position:relative;
      margin-bottom:10px;
    }
    .in i{
      position:absolute;
      left:12px;
      top:50%;
      transform:translateY(-50%);
      color:#64748b;
      font-size:18px;
    }
    .in input{
      width:100%;
      padding:10px 14px 10px 42px;
      border-radius:999px;
      border:1px solid rgba(148,163,184,.45);
      background: rgba(15,23,42,.92);
      color:var(--text);
      outline:none;
      transition: border-color var(--t), box-shadow var(--t), transform var(--t);
      font-size:14px;
    }
    .in input:focus{
      border-color: var(--accent);
      box-shadow:0 0 0 1px rgba(56,189,248,.4);
      transform: translateY(-1px);
    }
    .btn{
      border:0;
      border-radius:999px;
      padding:10px 14px;
      cursor:pointer;
      font-weight:800;
      font-size:14px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      transition: transform .12s ease, filter .12s ease, box-shadow .12s ease;
      user-select:none;
      white-space:nowrap;
    }
    .btn:active{ transform:translateY(0); }
    .btn-primary{
      width:100%;
      background: linear-gradient(135deg, var(--accent), #22c1c3);
      color:#07101f;
      box-shadow:0 12px 30px rgba(56,189,248,.33);
    }
    .btn-primary:hover{
      filter: brightness(1.03);
      transform: translateY(-1px);
      box-shadow:0 16px 40px rgba(56,189,248,.44);
    }
    .err{
      margin-top:10px;
      display:none;
      color: var(--danger);
      font-size:13px;
    }

    /* App layout */
    .app{
      display:none;
      min-height:100vh;
      gap:14px;
      padding:14px;
      grid-template-columns: clamp(240px, 25vw, 290px) 1fr;
      opacity:0;
      transform: translateY(10px);
      transition: opacity .24s ease, transform .24s ease;
    }
    .app.visible{ opacity:1; transform: translateY(0); display:grid; }

    .sidebar{
      background: rgba(15,23,42,.74);
      border:1px solid var(--border);
      border-radius:20px;
      box-shadow: var(--shadow);
      padding:16px 14px;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      display:flex;
      flex-direction:column;
      overflow:hidden;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      padding-bottom:12px;
      border-bottom:1px dashed rgba(148,163,184,.28);
      margin-bottom:10px;
    }
    .logo{
      width:42px; height:42px;
      border-radius:14px;
      background: radial-gradient(circle at top, #38bdf8, #0ea5e9);
      display:flex; align-items:center; justify-content:center;
      color:#06101f;
      font-weight:900;
      letter-spacing:.03em;
    }
    .brand h1{
      margin:0;
      font-size:13px;
      letter-spacing:.12em;
      text-transform: uppercase;
      color:#cbd5e1;
    }
    .brand p{
      margin:2px 0 0;
      font-size:11px;
      color:#94a3b8;
    }
    .menu{
      flex:1;
      overflow:auto;
      padding-left:2px;
      scrollbar-width: thin;
      scrollbar-color: rgba(148,163,184,.35) transparent;
    }
    .menu::-webkit-scrollbar{ width:4px; }
    .menu::-webkit-scrollbar-thumb{ background: rgba(148,163,184,.35); border-radius:999px; }
    .menu button{
      width:100%;
      border:0;
      background:transparent;
      color:var(--text);
      text-align:right;
      padding:8px 10px;
      border-radius:999px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      cursor:pointer;
      font-weight:700;
      font-size:13px;
      transition: background var(--t), transform .1s ease, box-shadow var(--t);
      margin-bottom:6px;
    }
    .menu button span{
      display:flex; align-items:center; gap:8px;
    }
    .menu button i{ font-size:16px; opacity:.92; }
    .menu button:hover{
      background: rgba(15,23,42,.92);
      transform: translateY(-1px);
      box-shadow:0 10px 24px rgba(15,23,42,.7);
    }
    .menu button.active{
      background: rgba(15,23,42,1);
      box-shadow:0 12px 26px rgba(15,23,42,.85);
      border:1px solid rgba(56,189,248,.25);
    }
    .sidebar-footer{
      padding-top:10px;
      border-top:1px dashed rgba(148,163,184,.28);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      flex-wrap:wrap;
      color:#64748b;
      font-size:11px;
    }
    .btn-ghost{
      background: rgba(15,23,42,.9);
      border:1px solid rgba(148,163,184,.38);
      color:var(--text);
      box-shadow:0 8px 18px rgba(15,23,42,.6);
      padding:6px 10px;
      font-size:12px;
      font-weight:800;
    }
    .btn-ghost:hover{ transform: translateY(-1px); background: rgba(15,23,42,1); }

    main{
      overflow:auto;
      padding:2px 0 2px 2px;
    }
    .topbar{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
      padding:8px 6px 14px;
    }
    .title{
      display:flex;
      align-items:center;
      gap:10px;
      margin:0;
      color:#e0f2fe;
      font-size:20px;
    }
    .badge{
      width:28px; height:28px;
      border-radius:999px;
      display:inline-flex; align-items:center; justify-content:center;
      background: rgba(15,23,42,.92);
      border:1px solid rgba(148,163,184,.35);
      color:#7dd3fc;
      font-size:15px;
    }
    .subtitle{
      margin:4px 0 0;
      font-size:12px;
      color:#64748b;
    }

    .controls{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
    }
    .btn-small{ padding:7px 12px; font-size:12px; font-weight:900; }
    .btn-green{
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color:#04101f;
      box-shadow:0 12px 26px rgba(34,197,94,.25);
    }

    .card{
      background: var(--card);
      border:1px solid rgba(148,163,184,.28);
      border-radius: var(--r);
      box-shadow: var(--shadow);
      padding:14px;
      margin-bottom:12px;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }
    .card h3{
      margin:0 0 10px;
      font-size:15px;
      display:flex; align-items:center; gap:8px;
      color:var(--text);
    }
    .card h3 i{ color:#38bdf8; font-size:18px; }

    .grid-2{
      display:grid;
      gap:12px;
      grid-template-columns: 1.6fr 1fr;
      align-items:start;
    }
    .row{ margin-bottom:10px; }
    label{
      display:block;
      margin-bottom:4px;
      color:#9ca3af;
      font-weight:800;
      font-size:12px;
    }
    input[type="text"], input[type="url"], input[type="search"], textarea, select{
      width:100%;
      padding:9px 10px;
      border-radius:12px;
      border:1px solid rgba(148,163,184,.45);
      background: rgba(15,23,42,.95);
      color:var(--text);
      outline:none;
      transition: border-color var(--t), box-shadow var(--t), transform var(--t);
      font-size:13px;
      font-family:inherit;
    }
    textarea{ min-height:80px; resize:vertical; }
    input:focus, textarea:focus, select:focus{
      border-color: var(--accent);
      box-shadow:0 0 0 1px rgba(56,189,248,.35);
      transform: translateY(-1px);
    }
    input[type="file"]{
      width:100%;
      padding:7px 10px;
      border-radius:12px;
      border:1px solid rgba(148,163,184,.45);
      background: rgba(15,23,42,.95);
      color:var(--muted);
      font-size:12px;
    }

    .toolbar{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
      margin:8px 0 6px;
      padding:6px;
      border-radius:999px;
      background: rgba(15,23,42,.9);
      border:1px solid rgba(148,163,184,.35);
    }
    .tool{
      border:0;
      background:transparent;
      color:var(--text);
      padding:6px 9px;
      border-radius:999px;
      cursor:pointer;
      transition: background var(--t), transform .1s ease;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:6px;
    }
    .tool:hover{ background: rgba(15,23,42,1); transform: translateY(-1px); color:#7dd3fc; }
    .editor{
      min-height:130px;
      border-radius:12px;
      border:1px solid rgba(148,163,184,.45);
      padding:10px;
      background: rgba(15,23,42,.95);
      outline:none;
      overflow:auto;
      font-size:13px;
    }
    .preview{
      margin-top:8px;
      font-size:12px;
      color:#93a3b8;
    }
    .preview img{
      width:100%;
      height:160px;
      object-fit:cover;
      border-radius:12px;
      border:1px solid rgba(148,163,184,.3);
      display:block;
      margin-top:8px;
    }

    .actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:10px;
    }

    .list-head{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
      justify-content:space-between;
      margin-bottom:10px;
    }
    .list-head .left{
      display:flex; gap:8px; flex-wrap:wrap; align-items:center;
    }
    .pill{
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(148,163,184,.35);
      background: rgba(15,23,42,.82);
      color:#cbd5e1;
      font-size:12px;
      font-weight:900;
    }
    .list{
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap:10px;
    }
    .item{
      background: var(--card2);
      border:1px solid rgba(148,163,184,.35);
      border-radius:16px;
      overflow:hidden;
      position:relative;
      box-shadow:0 12px 28px rgba(15,23,42,.72);
      transition: transform .12s ease, box-shadow .12s ease, border-color .12s ease;
    }
    .item:hover{
      transform: translateY(-2px);
      border-color: rgba(56,189,248,.45);
      box-shadow:0 16px 34px rgba(15,23,42,.82);
    }
    .item img{
      width:100%;
      height:120px;
      object-fit:cover;
      display:block;
      border-bottom:1px solid rgba(148,163,184,.25);
    }
    .item-body{ padding:10px; }
    .item-title{
      margin:0 0 6px;
      font-size:14px;
      color:#e2f3ff;
      font-weight:900;
    }
    .item-desc{
      margin:0 0 8px;
      font-size:12px;
      color:#9ca3af;
      display:-webkit-box;
      -webkit-line-clamp:3;
      -webkit-box-orient: vertical;
      overflow:hidden;
      min-height:48px;
    }
    .item-meta{
      font-size:10px;
      color:#94a3b8;
      display:flex;
      justify-content:space-between;
      gap:8px;
      flex-wrap:wrap;
    }
.item-actions{
  position:absolute;
  top:10px;
  left:10px;
  display:flex;
  gap:8px;
  z-index:10;
}

.mini{
  width:36px;
  height:36px;
  display:flex;
  align-items:center;
  justify-content:center;
  border:1px solid rgba(255,255,255,.22);
  border-radius:999px;
  cursor:pointer;
  background: rgba(2,6,23,.92);
  color:#ffffff;
  box-shadow:0 8px 18px rgba(0,0,0,.35);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  transition: transform .15s ease, border-color .15s ease, background .15s ease;
}

.mini i{
  font-size:18px;
  line-height:1;
}

.mini:hover{
  transform: translateY(-1px) scale(1.04);
  border-color: rgba(56,189,248,.7);
  background: rgba(15,23,42,1);
}

.mini.danger{
  color:#fecaca;
  border-color: rgba(239,68,68,.45);
}

    .empty{
      padding:24px 10px;
      text-align:center;
      color:#6b7280;
      font-size:13px;
      border:1px dashed rgba(148,163,184,.28);
      border-radius:16px;
      background: rgba(15,23,42,.55);
    }

    @media (max-width: 980px){
      .app{ grid-template-columns: 1fr; padding:12px; }
      .sidebar{ flex-direction:row; gap:10px; align-items:flex-start; }
      .menu{ display:flex; gap:8px; overflow:auto; padding:0; }
      .menu button{ flex:0 0 auto; white-space:nowrap; margin:0; }
      .grid-2{ grid-template-columns:1fr; }
    }
  </style>
</head>

<body>
  <!-- شاشة القفل -->
  <div id="lock" class="lock">
    <div class="lock-card">
      <h2 class="lock-title"><i class="ri-shield-user-line"></i> تسجيل دخول الإدارة</h2>
      <p class="lock-desc">أدخل كود الإدارة وكلمة المرور لفتح لوحة التحكم.</p>

      <div class="in">
        <i class="ri-user-3-line"></i>
        <input id="adminCode" type="text" placeholder="كود الإدارة" autocomplete="off" />
      </div>

      <div class="in">
        <i class="ri-lock-password-line"></i>
        <input id="adminPass" type="password" placeholder="كلمة المرور" autocomplete="off" />
      </div>

      <button class="btn btn-primary" id="loginBtn" type="button">
        دخول <i class="ri-arrow-left-line"></i>
      </button>

      <div id="loginErr" class="err">بيانات الدخول غير صحيحة.</div>
    </div>
  </div>

  <!-- التطبيق -->
  <div class="app" id="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="logo">AD</div>
        <div>
          <h1>ADMIN PANEL</h1>
          <p>لوحة التحكم - Ofouq Academy</p>
        </div>
      </div>

      <nav class="menu" id="menu" aria-label="الأقسام">
        <!-- سيتم حقن الأزرار من JS -->
      </nav>

      <div class="sidebar-footer">
        <span>تم التطوير لصالح المنصة</span>
        <button class="btn btn-ghost" id="logoutBtn" type="button">
          <i class="ri-logout-circle-line"></i> خروج
        </button>
      </div>
    </aside>

    <main>
      <div class="topbar">
        <div>
          <h2 class="title">
            <span class="badge"><i class="ri-layout-row-line"></i></span>
            <span id="sectionTitle">الأبحاث المحكمة</span>
          </h2>
          <div class="subtitle">أضف/عدّل/احذف المحتوى، وسيتم التحديث في Firestore و localStorage.</div>
        </div>

        <div class="controls">
          <button class="btn btn-ghost btn-small" id="reloadBtn" type="button">
            <i class="ri-refresh-line"></i> تحديث من Firestore
          </button>
          <button class="btn btn-ghost btn-small" id="exportBtn" type="button">
            <i class="ri-download-cloud-2-line"></i> تصدير JSON
          </button>
          <button class="btn btn-ghost btn-small" id="clearBtn" type="button">
            <i class="ri-database-2-line"></i> مسح localStorage
          </button>
          <button class="btn btn-small btn-green" id="syncBtn" type="button">
            <i class="ri-cloud-line"></i> مزامنة (Firestore → localStorage)
          </button>
        </div>
      </div>

      <!-- منطقة المحتوى -->
      <div id="content">
        <!-- سيتم توليد الفورم + قائمة العناصر من JS -->
      </div>
    </main>
  </div>

  <!-- ملاحظة: هذا الملف يعتمد على firestore-bridge.js مثل مشروعك الحالي -->

<script type="module" src="./firestore-bridge.js"></script>
<script>
const ADMIN_CODE = "admin";
const ADMIN_PASS = "ofouqaca12";

const SECTIONS = [
  { key: "research", title: "الأبحاث المحكمة", icon: "ri-file-text-line", allowFile: true },
  { key: "articles", title: "المقالات العلمية", icon: "ri-file-paper-line", allowFile: true },
  { key: "files", title: "الملفات البحثية", icon: "ri-folder-3-line", allowFile: true },
  { key: "general-articles", title: "مقالات عامة", icon: "ri-newspaper-line", allowFile: true },
  { key: "foreign-articles", title: "مقالات أجنبية", icon: "ri-article-line", allowFile: true },
  { key: "special-politics", title: "تخصص: العلوم السياسية", icon: "ri-government-line", allowFile: true },
  { key: "special-ir", title: "تخصص: العلاقات الدولية", icon: "ri-global-line", allowFile: true },
  { key: "special-admin-law", title: "تخصص: القانون الإداري", icon: "ri-briefcase-4-line", allowFile: true },
  { key: "special-const-law", title: "تخصص: القانون الدستوري", icon: "ri-balance-line", allowFile: true },
  { key: "special-public-policy", title: "تخصص: السياسات العامة", icon: "ri-community-line", allowFile: true },
  { key: "editions", title: "الإصدارات", icon: "ri-book-open-line", allowFile: true },
  { key: "activities", title: "الأنشطة", icon: "ri-calendar-2-line", allowFile: true },
  { key: "talks", title: "الندوات/الحوارات", icon: "ri-voiceprint-line", allowFile: true },
  { key: "training", title: "التكوين/الدورات", icon: "ri-train-line", allowFile: true },
  { key: "live", title: "البث المباشر", icon: "ri-live-line", allowFile: true, isLive: true }
];

const db = {};
SECTIONS.forEach(s => db[s.key] = []);

let currentSectionKey = "research";
let editing = { key: null, id: null, originalId: null };
let draftMode = false;

function safeParse(v, fallback) {
  try {
    const x = JSON.parse(v);
    return Array.isArray(x) ? x : fallback;
  } catch {
    return fallback;
  }
}

function uid() {
  return Date.now() + Math.floor(Math.random() * 999);
}

function el(id) {
  return document.getElementById(id);
}

function esc(s) {
  return String(s ?? "").replace(/[&<>"']/g, m => ({
    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    '"': "&quot;",
    "'": "&#039;"
  }[m]));
}

function getByLang(field, lang = "ar") {
  if (!field) return "";
  if (typeof field === "string") return field;
  return field[lang] || field.ar || field.fr || field.en || "";
}

function setAppVisible() {
  el("lock").classList.add("hidden");
  setTimeout(() => { el("lock").style.display = "none"; }, 220);
  const app = el("app");
  app.style.display = "grid";
  requestAnimationFrame(() => app.classList.add("visible"));
}

function setLockVisible() {
  const app = el("app");
  app.classList.remove("visible");
  setTimeout(() => { app.style.display = "none"; }, 180);
  el("lock").style.display = "flex";
  requestAnimationFrame(() => el("lock").classList.remove("hidden"));
}

async function waitForFS(timeout = 8000) {
  const start = Date.now();
  while (Date.now() - start < timeout) {
    if (
      window.fs &&
      window.fs.db &&
      window.fs.collection &&
      window.fs.getDocs &&
      window.fs.doc &&
      window.fs.setDoc &&
      window.fs.deleteDoc
    ) return true;
    await new Promise(r => setTimeout(r, 120));
  }
  return false;
}

async function requireFs() {
  const ok = await waitForFS();
  if (!ok) {
    alert("Firestore غير جاهز. تأكد من firestore-bridge.js");
    return false;
  }
  return true;
}

function showSection(key) {

function bindSearch(key) {

  if (!inp) return;

function bindPreviewHandlers(key) {
  const cfg = SECTIONS.find(s => s.key === key);
  const preview = el(`${key}-preview`);
  if (!preview || cfg?.isLive) return;

  const imgInput = el(`${key}-image`);
  const vidInput = el(`${key}-video`);

  if (imgInput) {
    imgInput.addEventListener("change", () => {
      if (!imgInput.files || !imgInput.files[0]) return;
      const url = URL.createObjectURL(imgInput.files[0]);
      preview.innerHTML = `<div>معاينة الصورة:</div><img src="${url}" alt="preview">`;
    });
  }

  if (vidInput) {
    vidInput.addEventListener("change", () => {
      if (!vidInput.files || !vidInput.files[0]) return;
      const file = vidInput.files[0];
      const url = URL.createObjectURL(file);
      const sizeMB = (file.size / (1024 * 1024)).toFixed(1);
      preview.innerHTML = `
        <div>معاينة الفيديو:</div>
        <video controls style="width:100%; border-radius:12px; border:1px solid rgba(148,163,184,.35); max-height:260px;">
          <source src="${url}">

  }
}

async function uploadVideoToServer(file) {
  const formData = new FormData();
  formData.append("video", file);

  const res = await fetch("http://localhost:3000/upload-video", {
    method: "POST",
    body: formData
  });

  if (!res.ok) throw new Error("فشل رفع الفيديو");
  const data = await res.json();
  if (!data || !data.url) throw new Error("السيرفر لم يرجع رابط الفيديو");
  return data.url;
}

function fileToDataURL(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = e => resolve(e.target.result);
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}

function getContentCache() {
  return safeParse(localStorage.getItem("content_cache"), []);
}

function setContentCache(items) {
  localStorage.setItem("content_cache", JSON.stringify(items));
}

function rebuildDbFromCache() {
  const all = getContentCache();
  SECTIONS.forEach(s => {
    db[s.key] = all.filter(item => item.section === s.key);
  });
}

function upsertLocal(key, obj) {
  const all = getContentCache();
  const normalized = { ...obj, section: key };
  const idx = all.findIndex(x =>
    String(x.id) === String(normalized.id) || String(x.docId) === String(normalized.docId)
  );

  if (idx >= 0) all[idx] = normalized;
  else all.unshift(normalized);

  setContentCache(all);
  rebuildDbFromCache();
  editing = { key: null, id: null, originalId: null };
}

async function upsertFirestore(sectionKey, obj) {
  const now = Date.now();
  const docId = String(obj.docId || obj.id || uid());

  obj.id = docId;
  obj.docId = docId;
  obj.section = sectionKey;
  obj.updatedAt = now;
  if (!obj.createdAt) obj.createdAt = now;
  if (!obj.status) obj.status = "published";

  const docRef = window.fs.doc(window.fs.db, "content", docId);
  await window.fs.setDoc(docRef, obj, { merge: true });
  return obj;
}

async function saveItem(key) {
  const cfg = SECTIONS.find(s => s.key === key);
  if (!cfg) return;
  if (!(await requireFs())) return;

  const isLive = !!cfg.isLive;
  const currentId = editing.key === key && editing.id ? editing.id : String(uid());

  const obj = {
    id: currentId,
    docId: currentId,
    title: { ar: "", fr: "", en: "" },
    short: { ar: "", fr: "", en: "" },
    full: { ar: "", fr: "", en: "" },
    details: { ar: "", fr: "", en: "" },
    author: { ar: "", fr: "", en: "" },
    affiliation: { ar: "", fr: "", en: "" },
    date: { ar: "", fr: "", en: "" },
    image: "",
    file: ""
  };

  if (isLive) {
    const titleAr = el(`${key}-title-ar`)?.value.trim() || "";
    const shortAr = el(`${key}-short-ar`)?.value.trim() || "";
    const link = el(`${key}-live-link`)?.value.trim() || "";

    if (!titleAr) return alert("أدخل عنوان البث بالعربية أولاً");

    obj.title.ar = titleAr;
    obj.short.ar = shortAr;
    obj.file = link;
  } else {
    const titleAr = el(`${key}-title-ar`)?.value.trim() || "";
    if (!titleAr) return alert("أدخل العنوان بالعربية أولاً");

    obj.title.ar = titleAr;
    obj.author.ar = el(`${key}-author-ar`)?.value.trim() || "";
    obj.affiliation.ar = el(`${key}-aff-ar`)?.value.trim() || "";
    obj.date.ar = el(`${key}-date-ar`)?.value.trim() || "";
    obj.short.ar = el(`${key}-short-ar`)?.value.trim() || "";
    obj.full.ar = (el(`${key}-full-ar-editor`)?.innerHTML || "").trim();
    obj.details.ar = el(`${key}-details-ar`)?.value.trim() || "";

    const externalUrl = el(`${key}-file-url`)?.value.trim() || "";
    const imgInput = el(`${key}-image`);
    const vidInput = el(`${key}-video`);

    try {
      if (imgInput && imgInput.files && imgInput.files[0]) {
        obj.image = await fileToDataURL(imgInput.files[0]);
      }

      if (externalUrl) {
        obj.file = externalUrl;
      } else if (vidInput && vidInput.files && vidInput.files[0]) {
        obj.file = await uploadVideoToServer(vidInput.files[0]);
      }
    } catch (err) {
      console.error(err);
      alert("حدث خطأ أثناء تجهيز الملفات أو رفع الفيديو");
      return;
    }
  }

  if (editing.key === key && editing.id) {
    const old = (db[key] || []).find(x => String(x.id) === String(editing.id));
    if (old) {
      if (!obj.image) obj.image = old.image || "";
      if (!obj.file) obj.file = old.file || "";
      if (!obj.createdAt) obj.createdAt = old.createdAt || Date.now();
    }
  }

  upsertLocal(key, obj);

  try {
    await upsertFirestore(key, obj);
  } catch (err) {
    console.error(err);
    alert("تم الحفظ محليًا لكن فشل الحفظ في Firestore");
    return;
  }

  resetForm(key);
  renderList(key);
  alert("تم الحفظ بنجاح");
}

function fillFormFromItem(key, item) {
  const cfg = SECTIONS.find(s => s.key === key);
  if (!item || !cfg) return;

  if (cfg.isLive) {
    if (el(`${key}-title-ar`)) el(`${key}-title-ar`).value = getByLang(item.title, "ar") || "";
    if (el(`${key}-short-ar`)) el(`${key}-short-ar`).value = getByLang(item.short, "ar") || "";
    if (el(`${key}-live-link`)) el(`${key}-live-link`).value = item.file || "";
    const p = el(`${key}-preview`);
    if (p) p.innerHTML = item.file ? `<div>الرابط الحالي: <a href="${item.file}" target="_blank" rel="noopener">${item.file}</a></div>` : "";
    return;
  }

  if (el(`${key}-title-ar`)) el(`${key}-title-ar`).value = getByLang(item.title, "ar") || "";
  if (el(`${key}-author-ar`)) el(`${key}-author-ar`).value = getByLang(item.author, "ar") || "";
  if (el(`${key}-aff-ar`)) el(`${key}-aff-ar`).value = getByLang(item.affiliation, "ar") || "";
  if (el(`${key}-date-ar`)) el(`${key}-date-ar`).value = getByLang(item.date, "ar") || "";
  if (el(`${key}-short-ar`)) el(`${key}-short-ar`).value = getByLang(item.short, "ar") || "";
  if (el(`${key}-details-ar`)) el(`${key}-details-ar`).value = getByLang(item.details, "ar") || "";
  if (el(`${key}-full-ar-editor`)) el(`${key}-full-ar-editor`).innerHTML = getByLang(item.full, "ar") || "";
  if (el(`${key}-file-url`)) el(`${key}-file-url`).value = item.file || "";

  const p = el(`${key}-preview`);
  if (p) {
    p.innerHTML = `
      ${item.image ? `<div>الصورة الحالية:</div><img src="${item.image}" alt="preview">` : ""}
      ${item.file ? `<div style="margin-top:8px;">الرابط الحالي: <a href="${item.file}" target="_blank" rel="noopener">${item.file}</a></div>` : ""}
    `;
  }
}

async function deleteItem(sectionKey, id) {
  const ok = confirm("سيتم حذف العنصر من localStorage و Firestore. هل أنت متأكد؟");
  if (!ok) return;

  const all = getContentCache();
  const item = all.find(x => String(x.id) === String(id) || String(x.docId) === String(id));
  const filtered = all.filter(x => String(x.id) !== String(id) && String(x.docId) !== String(id));

  setContentCache(filtered);
  rebuildDbFromCache();
  renderList(sectionKey);

  if (!(await requireFs())) return;

  try {
    const docId = item?.docId || item?.id || id;
    await window.fs.deleteDoc(window.fs.doc(window.fs.db, "content", String(docId)));
  } catch (e) {
    console.error("Firestore delete error:", e);
    alert("تعذر حذف العنصر من Firestore");
  }
}

function resetForm(key) {
  editing = { key: null, id: null, originalId: null };

  const cfg = SECTIONS.find(s => s.key === key);
  if (cfg?.isLive) {
    if (el(`${key}-title-ar`)) el(`${key}-title-ar`).value = "";
    if (el(`${key}-short-ar`)) el(`${key}-short-ar`).value = "";
    if (el(`${key}-live-link`)) el(`${key}-live-link`).value = "";
    const p = el(`${key}-preview`);
    if (p) p.innerHTML = "";
    return;
  }

  ["title-ar", "author-ar", "aff-ar", "date-ar", "short-ar", "details-ar", "file-url"].forEach(name => {
    const node = el(`${key}-${name}`);
    if (node) node.value = "";
  });

  const ed = el(`${key}-full-ar-editor`);
  if (ed) ed.innerHTML = "";

  const img = el(`${key}-image`);
  if (img) img.value = "";

  const vid = el(`${key}-video`);
  if (vid) vid.value = "";

  const p = el(`${key}-preview`);
  if (p) p.innerHTML = "";

  const publishBtn = el(`${key}-publish-btn`);
  if (publishBtn) publishBtn.innerHTML = '<i class="ri-upload-cloud-line"></i> نشر';
}

function renderList(key) {
  const list = el(`${key}-list`);
  const count = el(`${key}-count`);
  if (!list || !count) return;

  const q = (el(`${key}-search`)?.value || "").trim().toLowerCase();

  const data = (db[key] || []).filter(item => {
    if (!q) return true;
    const t = getByLang(item.title, "ar").toLowerCase();
    const s = getByLang(item.short, "ar").toLowerCase();
    return t.includes(q) || s.includes(q);
  });

  count.textContent = `${data.length} عنصر`;

  if (!data.length) {
    list.innerHTML = `<div class="empty">لا توجد عناصر هنا بعد.</div>`;
    return;
  }

  list.innerHTML = "";
  data.forEach(item => {
    const title = getByLang(item.title, "ar");
    const descFull = getByLang(item.short, "ar") || getByLang(item.details, "ar");
    const desc = descFull.length > 120 ? descFull.slice(0, 120) + "..." : descFull;
    const author = getByLang(item.author, "ar");
    const dateLabel = getByLang(item.date, "ar");
    const imgHtml = item.image
      ? `<img src="${item.image}" alt="img">`
      : `<img src="images/ofouq-logo.jpeg" alt="logo">`;

    const wrap = document.createElement("div");
    wrap.className = "item";
    wrap.innerHTML = `
      <div class="item-actions">
        <button class="mini" title="تعديل" onclick="loadForEdit('${key}', '${item.id}')"><i class="ri-pencil-line"></i></button>
        <button class="mini danger" title="حذف" onclick="deleteItem('${key}', '${item.docId || item.id}')"><i class="ri-delete-bin-line"></i></button>
      </div>
      ${imgHtml}
      <div class="item-body">
        <div class="item-title">${esc(title)}</div>
        <div class="item-desc">${esc(desc)}</div>
        <div class="item-meta">
          <span>${esc(author)}</span>
          <span>${esc(dateLabel)}</span>
        </div>
      </div>
    `;
    list.appendChild(wrap);
  });
}

function loadForEdit(key, id) {
  const item = (db[key] || []).find(x => String(x.id) === String(id));
  if (!item) return alert("العنصر غير موجود.");
  editing = { key, id, originalId: id };
  draftMode = true;
  fillFormFromItem(key, item);
  const publishBtn = el(`${key}-publish-btn`);
  if (publishBtn) publishBtn.innerHTML = '<i class="ri-upload-cloud-line"></i> تحديث';
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function collectDraftData(key) {
  const cfg = SECTIONS.find(s => s.key === key);
  if (!cfg) return null;

  const obj = {
    id: editing.key === key && editing.id ? editing.id : uid(),
    title: { ar: "", fr: "", en: "" },
    short: { ar: "", fr: "", en: "" },
    full: { ar: "", fr: "", en: "" },
    details: { ar: "", fr: "", en: "" },
    author: { ar: "", fr: "", en: "" },
    affiliation: { ar: "", fr: "", en: "" },
    date: { ar: "", fr: "", en: "" },
    image: "",
    file: ""
  };

  if (cfg.isLive) {
    obj.title.ar = el(`${key}-title-ar`)?.value.trim() || "";
    obj.short.ar = el(`${key}-short-ar`)?.value.trim() || "";
    obj.file = el(`${key}-live-link`)?.value.trim() || "";
    return obj;
  }

  obj.title.ar = el(`${key}-title-ar`)?.value.trim() || "";
  obj.author.ar = el(`${key}-author-ar`)?.value.trim() || "";
  obj.affiliation.ar = el(`${key}-aff-ar`)?.value.trim() || "";
  obj.date.ar = el(`${key}-date-ar`)?.value.trim() || "";
  obj.short.ar = el(`${key}-short-ar`)?.value.trim() || "";
  obj.full.ar = (el(`${key}-full-ar-editor`)?.innerHTML || "").trim();
  obj.details.ar = el(`${key}-details-ar`)?.value.trim() || "";
  obj.file = el(`${key}-file-url`)?.value.trim() || "";
  return obj;
}

function saveDraft(key) {
  const draft = collectDraftData(key);
  if (!draft) return;
  sessionStorage.setItem(`draft-${key}-${draft.id}`, JSON.stringify(draft));
  draftMode = true;
  alert("تم حفظ المسودة في المتصفح");
}

async function publishItem(key) {
  await saveItem(key);
  draftMode = false;
  const publishBtn = el(`${key}-publish-btn`);
  if (publishBtn) publishBtn.innerHTML = '<i class="ri-upload-cloud-line"></i> نشر';
}

async function reloadFromFirestore() {
  if (!(await requireFs())) return;

  try {
    const col = window.fs.collection(window.fs.db, "content");
    const snap = await window.fs.getDocs(col);

    const all = [];
    snap.forEach(docSnap => {
      all.push({ docId: docSnap.id, ...docSnap.data() });
    });

    all.sort((a, b) =>
      Number(b.updatedAt || b.createdAt || b.id || 0) -
      Number(a.updatedAt || a.createdAt || a.id || 0)
    );

    localStorage.setItem("content_cache", JSON.stringify(all));
    rebuildDbFromCache();
    renderList(currentSectionKey);
    alert("تم تحميل المحتوى من Firestore");
  } catch (e) {
    console.error("Firestore load error:", e);
    alert("تعذر تحميل المحتوى من Firestore");
  }
}

function exportJSON() {
  const out = {};
  SECTIONS.forEach(s => out[s.key] = db[s.key]);

  const blob = new Blob([JSON.stringify(out, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "site-data.json";
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function clearLocalStorage() {
  const ok = confirm("سيتم مسح المحتوى المحلي فقط. هل تريد المتابعة؟");
  if (!ok) return;
  localStorage.removeItem("content_cache");
  SECTIONS.forEach(s => db[s.key] = []);
  showSection(currentSectionKey);
  alert("تم مسح التخزين المحلي");
}

async function initAfterLogin() {
  buildMenu();
  rebuildDbFromCache();
  showSection(currentSectionKey);
  await reloadFromFirestore();
}

function bindGlobal() {
  el("loginBtn").addEventListener("click", login);
  el("logoutBtn").addEventListener("click", logout);
  el("reloadBtn").addEventListener("click", reloadFromFirestore);
  el("syncBtn").addEventListener("click", reloadFromFirestore);
  el("exportBtn").addEventListener("click", exportJSON);
  el("clearBtn").addEventListener("click", clearLocalStorage);

  document.addEventListener("keydown", e => {
    if (e.key === "Enter" && el("lock").style.display !== "none" && !e.shiftKey) login();
  });
}

bindGlobal();
window.addEventListener("load", () => {
  rebuildDbFromCache();
  if (sessionStorage.getItem("adminAuthed") === "1") {
    setAppVisible();
    initAfterLogin();
  } else {
    el("lock").style.display = "flex";
    el("app").style.display = "none";
  }
});

window.showSection = showSection;
window.saveItem = saveItem;
window.resetForm = resetForm;
window.loadForEdit = loadForEdit;
window.deleteItem = deleteItem;
window.formatCmd = formatCmd;
window.saveDraft = saveDraft;
window.publishItem = publishItem;
window.fillFormFromItem = fillFormFromItem;
</script>
