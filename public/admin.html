<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة التحكم - Ofouq Academy</title>

  <link rel="icon" type="image/png" href="logo1222.jpeg">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet" />

  <style>
    :root{
      --accent:#0ea5e9;
      --accent2:#22c55e;
      --bg1:#020617;
      --bg2:#0b1120;
      --card: rgba(15,23,42,.86);
      --card2: rgba(15,23,42,.92);
      --text:#e5e7eb;
      --muted:#94a3b8;
      --border: rgba(148,163,184,.26);
      --danger:#ef4444;
      --warning:#f59e0b;
      --shadow: 0 18px 45px rgba(15,23,42,.65);
      --r:18px;
      --t: .18s ease;
    }

    *{ box-sizing:border-box; }
    html,body{ width:100%; overflow-x:hidden; }

    body{
      margin:0;
      font-family:"Tajawal",sans-serif;
      background: radial-gradient(circle at top left, var(--bg2) 0%, var(--bg1) 55%, #000 100%);
      color:var(--text);
      line-height:1.65;
      -webkit-font-smoothing:antialiased;
    }

    .lock{
      position:fixed;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px;
      background: radial-gradient(circle at top, #0f172a 0%, #020617 55%, #000 100%);
      z-index:9999;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      transition: opacity .24s ease, visibility .24s ease;
    }

    .lock.hidden{
      opacity:0;
      visibility:hidden;
    }

    .lock-card{
      width:min(420px, 100%);
      background: linear-gradient(135deg, rgba(15,23,42,.94), rgba(15,23,42,.76));
      border:1px solid rgba(148,163,184,.38);
      border-radius:22px;
      box-shadow: var(--shadow);
      padding:22px 18px 18px;
      position:relative;
      overflow:hidden;
    }

    .lock-card:before{
      content:"";
      position:absolute;
      width:180px;
      height:180px;
      top:-70px;
      left:-60px;
      background: radial-gradient(circle, rgba(56,189,248,.35), transparent 60%);
      opacity:.9;
      pointer-events:none;
    }

    .lock-title{
      margin:0 0 6px;
      font-size:20px;
      display:flex;
      align-items:center;
      gap:8px;
      color:#e0f2fe;
    }

    .lock-title i{
      color:#38bdf8;
      font-size:22px;
    }

    .lock-desc{
      margin:0 0 16px;
      color:var(--muted);
      font-size:13px;
    }

    .in{
      position:relative;
      margin-bottom:10px;
    }

    .in i{
      position:absolute;
      left:12px;
      top:50%;
      transform:translateY(-50%);
      color:#64748b;
      font-size:18px;
    }

    .in input{
      width:100%;
      padding:10px 14px 10px 42px;
      border-radius:999px;
      border:1px solid rgba(148,163,184,.45);
      background: rgba(15,23,42,.92);
      color:var(--text);
      outline:none;
      transition: border-color var(--t), box-shadow var(--t), transform var(--t);
      font-size:14px;
    }

    .in input:focus{
      border-color: var(--accent);
      box-shadow:0 0 0 1px rgba(56,189,248,.4);
      transform: translateY(-1px);
    }

    .btn{
      border:0;
      border-radius:999px;
      padding:10px 14px;
      cursor:pointer;
      font-weight:800;
      font-size:14px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      transition: transform .12s ease, filter .12s ease, box-shadow .12s ease;
      user-select:none;
      white-space:nowrap;
    }

    .btn-primary{
      width:100%;
      background: linear-gradient(135deg, var(--accent), #22c1c3);
      color:#07101f;
      box-shadow:0 12px 30px rgba(56,189,248,.33);
    }

    .btn-primary:hover{
      filter: brightness(1.03);
      transform: translateY(-1px);
      box-shadow:0 16px 40px rgba(56,189,248,.44);
    }

    .btn-ghost{
      background: rgba(15,23,42,.9);
      border:1px solid rgba(148,163,184,.38);
      color:var(--text);
      box-shadow:0 8px 18px rgba(15,23,42,.6);
      padding:6px 10px;
      font-size:12px;
      font-weight:800;
    }

    .btn-ghost:hover{
      transform: translateY(-1px);
      background: rgba(15,23,42,1);
    }

    .btn-small{
      padding:7px 12px;
      font-size:12px;
      font-weight:900;
    }

    .btn-green{
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color:#04101f;
      box-shadow:0 12px 26px rgba(34,197,94,.25);
    }

    .btn-warn{
      background: linear-gradient(135deg, #f59e0b, #f97316);
      color:#111827;
      box-shadow:0 12px 26px rgba(245,158,11,.22);
    }

    .err{
      margin-top:10px;
      display:none;
      color: var(--danger);
      font-size:13px;
    }

.app{
  display:grid;
  min-height:100vh;
  gap:14px;
  padding:14px;
  grid-template-columns: clamp(240px, 25vw, 290px) 1fr;
  opacity:1;
  transform:none;
  transition: opacity .24s ease, transform .24s ease;
}

.app.visible{
  opacity:1;
  transform:none;
  display:grid;
}

    .sidebar{
      background: rgba(15,23,42,.74);
      border:1px solid var(--border);
      border-radius:20px;
      box-shadow: var(--shadow);
      padding:16px 14px;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      display:flex;
      flex-direction:column;
      overflow:hidden;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      padding-bottom:12px;
      border-bottom:1px dashed rgba(148,163,184,.28);
      margin-bottom:10px;
    }

    .logo{
      width:42px;
      height:42px;
      border-radius:14px;
      background: radial-gradient(circle at top, #38bdf8, #0ea5e9);
      display:flex;
      align-items:center;
      justify-content:center;
      color:#06101f;
      font-weight:900;
      letter-spacing:.03em;
    }

    .brand h1{
      margin:0;
      font-size:13px;
      letter-spacing:.12em;
      text-transform: uppercase;
      color:#cbd5e1;
    }

    .brand p{
      margin:2px 0 0;
      font-size:11px;
      color:#94a3b8;
    }

    .menu{
      flex:1;
      overflow:auto;
      padding-left:2px;
    }

    .menu button{
      width:100%;
      border:0;
      background:transparent;
      color:var(--text);
      text-align:right;
      padding:8px 10px;
      border-radius:999px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      cursor:pointer;
      font-weight:700;
      font-size:13px;
      transition: background var(--t), transform .1s ease, box-shadow var(--t);
      margin-bottom:6px;
    }

    .menu button span{
      display:flex;
      align-items:center;
      gap:8px;
    }

    .menu button:hover{
      background: rgba(15,23,42,.92);
      transform: translateY(-1px);
      box-shadow:0 10px 24px rgba(15,23,42,.7);
    }

    .menu button.active{
      background: rgba(15,23,42,1);
      box-shadow:0 12px 26px rgba(15,23,42,.85);
      border:1px solid rgba(56,189,248,.25);
    }

    .sidebar-footer{
      padding-top:10px;
      border-top:1px dashed rgba(148,163,184,.28);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      flex-wrap:wrap;
      color:#64748b;
      font-size:11px;
    }

    main{
      overflow:auto;
      padding:2px 0 2px 2px;
    }

    .topbar{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
      padding:8px 6px 14px;
    }

    .title{
      display:flex;
      align-items:center;
      gap:10px;
      margin:0;
      color:#e0f2fe;
      font-size:20px;
    }

    .badge{
      width:28px;
      height:28px;
      border-radius:999px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      background: rgba(15,23,42,.92);
      border:1px solid rgba(148,163,184,.35);
      color:#7dd3fc;
      font-size:15px;
    }

    .subtitle{
      margin:4px 0 0;
      font-size:12px;
      color:#64748b;
    }

    .controls{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
    }

    .card{
      background: var(--card);
      border:1px solid rgba(148,163,184,.28);
      border-radius: var(--r);
      box-shadow: var(--shadow);
      padding:14px;
      margin-bottom:12px;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .card h3{
      margin:0 0 10px;
      font-size:15px;
      display:flex;
      align-items:center;
      gap:8px;
      color:var(--text);
    }

    .grid-2{
      display:grid;
      gap:12px;
      grid-template-columns: 1.6fr 1fr;
      align-items:start;
    }

    .grid-issues{
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap:12px;
    }

    .row{ margin-bottom:10px; }

    label{
      display:block;
      margin-bottom:4px;
      color:#9ca3af;
      font-weight:800;
      font-size:12px;
    }

    input[type="text"],
    input[type="url"],
    input[type="search"],
    textarea,
    select{
      width:100%;
      padding:9px 10px;
      border-radius:12px;
      border:1px solid rgba(148,163,184,.45);
      background: rgba(15,23,42,.95);
      color:var(--text);
      outline:none;
      transition: border-color var(--t), box-shadow var(--t), transform var(--t);
      font-size:13px;
      font-family:inherit;
    }

    textarea{
      min-height:80px;
      resize:vertical;
    }

    input:focus, textarea:focus, select:focus{
      border-color: var(--accent);
      box-shadow:0 0 0 1px rgba(56,189,248,.35);
      transform: translateY(-1px);
    }

    input[type="file"]{
      width:100%;
      padding:7px 10px;
      border-radius:12px;
      border:1px solid rgba(148,163,184,.45);
      background: rgba(15,23,42,.95);
      color:var(--muted);
      font-size:12px;
    }

    .editor{
      min-height:130px;
      border-radius:12px;
      border:1px solid rgba(148,163,184,.45);
      padding:10px;
      background: rgba(15,23,42,.95);
      outline:none;
      overflow:auto;
      font-size:13px;
    }

    .preview{
      margin-top:8px;
      font-size:12px;
      color:#93a3b8;
    }

    .preview img{
      width:100%;
      height:160px;
      object-fit:cover;
      border-radius:12px;
      border:1px solid rgba(148,163,184,.3);
      display:block;
      margin-top:8px;
    }

    .actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:10px;
    }

    .list-head{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
      justify-content:space-between;
      margin-bottom:10px;
    }

    .list-head .left{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
    }

    .pill{
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(148,163,184,.35);
      background: rgba(15,23,42,.82);
      color:#cbd5e1;
      font-size:12px;
      font-weight:900;
    }

    .list{
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap:10px;
    }

    .item{
      background: var(--card2);
      border:1px solid rgba(148,163,184,.35);
      border-radius:16px;
      overflow:hidden;
      position:relative;
      box-shadow:0 12px 28px rgba(15,23,42,.72);
    }

    .item img{
      width:100%;
      height:120px;
      object-fit:cover;
      display:block;
      border-bottom:1px solid rgba(148,163,184,.25);
    }

    .item-body{ padding:10px; }

    .item-title{
      margin:0 0 6px;
      font-size:14px;
      color:#e2f3ff;
      font-weight:900;
    }

    .item-desc{
      margin:0 0 8px;
      font-size:12px;
      color:#9ca3af;
      min-height:48px;
    }

    .item-meta{
      font-size:10px;
      color:#94a3b8;
      display:flex;
      justify-content:space-between;
      gap:8px;
      flex-wrap:wrap;
    }

    .item-actions{
      position:absolute;
      top:10px;
      left:10px;
      display:flex;
      gap:8px;
      z-index:10;
    }

    .mini{
      width:36px;
      height:36px;
      display:flex;
      align-items:center;
      justify-content:center;
      border:1px solid rgba(255,255,255,.22);
      border-radius:999px;
      cursor:pointer;
      background: rgba(2,6,23,.92);
      color:#ffffff;
    }

    .mini.danger{
      color:#fecaca;
      border-color: rgba(239,68,68,.45);
    }

    .empty{
      padding:24px 10px;
      text-align:center;
      color:#6b7280;
      font-size:13px;
      border:1px dashed rgba(148,163,184,.28);
      border-radius:16px;
      background: rgba(15,23,42,.55);
    }

    .status{
      margin-top:8px;
      font-size:12px;
      color:#93c5fd;
      white-space:pre-wrap;
    }

    .issue-card{
      background: var(--card2);
      border:1px solid rgba(148,163,184,.35);
      border-radius:18px;
      padding:14px;
      box-shadow:0 12px 28px rgba(15,23,42,.72);
    }

    .issue-top{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:flex-start;
      margin-bottom:12px;
    }

    .issue-name{
      margin:0;
      font-size:20px;
      color:#fff;
      font-weight:900;
    }

    .issue-sub{
      margin:4px 0 0;
      font-size:12px;
      color:#94a3b8;
    }

    .article-mini-list{
      display:flex;
      flex-direction:column;
      gap:8px;
      margin-top:10px;
    }

    .article-mini{
      border:1px solid rgba(148,163,184,.22);
      background: rgba(15,23,42,.8);
      border-radius:14px;
      padding:10px 12px;
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:center;
    }

    .article-mini h4{
      margin:0 0 3px;
      font-size:13px;
      color:#e5f3ff;
    }

    .article-mini p{
      margin:0;
      font-size:11px;
      color:#94a3b8;
    }

    .article-mini-actions{
      display:flex;
      gap:6px;
      flex-shrink:0;
    }

    .split-line{
      height:1px;
      background: rgba(148,163,184,.18);
      margin:12px 0;
    }

    .muted-note{
      color:#94a3b8;
      font-size:12px;
    }

    @media (max-width: 980px){
      .app{ grid-template-columns: 1fr; padding:12px; }
      .sidebar{ flex-direction:row; gap:10px; align-items:flex-start; }
      .menu{ display:flex; gap:8px; overflow:auto; padding:0; }
      .menu button{ flex:0 0 auto; white-space:nowrap; margin:0; }
      .grid-2{ grid-template-columns:1fr; }
    }
  </style>
</head>
<body>


  <div class="app" id="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="logo">AD</div>
        <div>
          <h1>ADMIN PANEL</h1>
          <p>لوحة التحكم - Ofouq Academy</p>
        </div>
      </div>

      <nav class="menu" id="menu" aria-label="الأقسام"></nav>
<div class="sidebar-footer">
  <span>إدارة المحتوى واستعادة البيانات</span>
</div>
    </aside>

    <main>
      <div class="topbar">
        <div>
          <h2 class="title">
            <span class="badge"><i class="ri-layout-row-line"></i></span>
            <span id="sectionTitle">الأبحاث المحكمة</span>
          </h2>
          <div class="subtitle">إدارة المحتوى محليًا وعلى Firestore مع دعم PDF وصور، وقسم خاص للإصدارات.</div>
        </div>

        <div class="controls">
          <button class="btn btn-ghost btn-small" id="reloadBtn" type="button">
            <i class="ri-refresh-line"></i> تحميل من Firestore
          </button>
          <button class="btn btn-ghost btn-small" id="exportBtn" type="button">
            <i class="ri-download-cloud-2-line"></i> تصدير JSON
          </button>
          <button class="btn btn-ghost btn-small" id="clearBtn" type="button">
            <i class="ri-database-2-line"></i> مسح الكاش المحلي
          </button>
          <button class="btn btn-small btn-green" id="recoverBtn" type="button">
            <i class="ri-history-line"></i> استرجاع البيانات
          </button>
        </div>
      </div>

      <div id="status" class="status">جاهز.</div>
      <div id="content"></div>
    </main>
  </div>

<script type="module">
  let db = null;
  let auth = null;
  let storage = null;
  let collection, getDocs, doc, setDoc, deleteDoc, signOut, ref, uploadBytes, getDownloadURL, deleteObject;

  try {
const firebaseCore = await import("./firebase-init.js");
    db = firebaseCore.db;
    auth = firebaseCore.auth;
    storage = firebaseCore.storage;

    const firestoreMod = await import("https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js");
    collection = firestoreMod.collection;
    getDocs = firestoreMod.getDocs;
    doc = firestoreMod.doc;
    setDoc = firestoreMod.setDoc;
    deleteDoc = firestoreMod.deleteDoc;

    const authMod = await import("https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js");
    signOut = authMod.signOut;

    const storageMod = await import("https://www.gstatic.com/firebasejs/12.7.0/firebase-storage.js");
    ref = storageMod.ref;
    uploadBytes = storageMod.uploadBytes;
    getDownloadURL = storageMod.getDownloadURL;
    deleteObject = storageMod.deleteObject;

    console.log("Firebase loaded successfully");
  } catch (err) {
    console.warn("Firebase failed to load, admin will run in local mode only.", err);
  }

  const SECTION_ALIASES = {
    "general-articles": "generalArticles",
    "foreign-articles": "foreignArticles",
    "special-politics": "specialPolitics",
    "special-ir": "specialIR",
    "special-admin-law": "specialAdminLaw",
    "special-const-law": "specialConstLaw",
    "special-public-policy": "specialPublicPolicy"
  };

  const SECTIONS = [
    { key: "research", title: "الأبحاث المحكمة", icon: "ri-file-text-line", isLive: false },
    { key: "articles", title: "المقالات العلمية", icon: "ri-file-paper-line", isLive: false },
    { key: "files", title: "الملفات البحثية", icon: "ri-folder-3-line", isLive: false },
    { key: "generalArticles", title: "مقالات عامة", icon: "ri-newspaper-line", isLive: false },
    { key: "foreignArticles", title: "مقالات أجنبية", icon: "ri-article-line", isLive: false },
    { key: "specialPolitics", title: "تخصص: العلوم السياسية", icon: "ri-government-line", isLive: false },
    { key: "specialIR", title: "تخصص: العلاقات الدولية", icon: "ri-global-line", isLive: false },
    { key: "specialAdminLaw", title: "تخصص: القانون الإداري", icon: "ri-briefcase-4-line", isLive: false },
    { key: "specialConstLaw", title: "تخصص: القانون الدستوري", icon: "ri-balance-line", isLive: false },
    { key: "specialPublicPolicy", title: "تخصص: السياسات العامة", icon: "ri-community-line", isLive: false },
    { key: "editions", title: "الإصدارات", icon: "ri-book-open-line", isLive: false },
    { key: "activities", title: "الأنشطة", icon: "ri-calendar-2-line", isLive: false },
    { key: "talks", title: "الندوات/الحوارات", icon: "ri-voiceprint-line", isLive: false },
    { key: "training", title: "التكوين/الدورات", icon: "ri-train-line", isLive: false },
    { key: "live", title: "البث المباشر", icon: "ri-live-line", isLive: true }
  ];

  const state = {
    bySection: {},
    currentSectionKey: "research",
    editing: { key: null, id: null },
    editionsEditingIssueId: null,
    editionsEditingArticleId: null
  };

  SECTIONS.forEach(s => state.bySection[s.key] = []);

  function el(id){ return document.getElementById(id); }

  function setStatus(msg){
    const node = el("status");
    if (node) node.textContent = msg;
  }
async function syncLocalCacheToFirestore(){
  const localItems = getContentCache().map(item => normalizeItem(item.section, item));

  if (!localItems.length) {
    setStatus("لا توجد بيانات محلية لرفعها.");
    return;
  }

  if (!db || !doc || !setDoc) {
    setStatus("Firestore غير متاح حاليًا.");
    return;
  }

  setStatus("جارٍ رفع البيانات المحلية إلى Firestore...");

  let success = 0;

  for (const item of localItems) {
    try {
      await upsertFirestore(item.section, item);
      success++;
    } catch (e) {
      console.error("Sync item failed:", item, e);
    }
  }

  setStatus(`تم رفع ${success} عنصر من الكاش المحلي إلى Firestore.`);
}
  function safeParse(v, fallback){
    try{
      const x = JSON.parse(v);
      return Array.isArray(x) ? x : fallback;
    }catch{
      return fallback;
    }
  }

  function uid(){
    return crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.floor(Math.random() * 99999));
  }

  function esc(s){
    return String(s ?? "").replace(/[&<>"']/g, m => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      "\"": "&quot;",
      "'": "&#039;"
    }[m]));
  }

  function getByLang(field, lang = "ar"){
    if (!field) return "";
    if (typeof field === "string") return field;
    return field[lang] || field.ar || field.fr || field.en || "";
  }

  function stripHtml(html){
    const div = document.createElement("div");
    div.innerHTML = html || "";
    return div.textContent || div.innerText || "";
  }

  function getContentCache(){
    return safeParse(localStorage.getItem("content_cache"), []);

  function setContentCache(items){

  function normalizeSectionKey(sectionKey){

    const arMap = {
      1:"العدد الأول",

    };
    return arMap[num] || `العدد ${num}`;
  }

  function normalizeEditionItem(raw){
    const issueNumber = Number(raw.issueNumber || raw.number || 1);
    const issueId = String(raw.docId || raw.id || uid());
    const articles = Array.isArray(raw.articles) ? raw.articles : [];

    return {
      id: issueId,
      docId: issueId,
      section: "editions",
      issueNumber,
      title: typeof raw.title === "object"
        ? raw.title
        : { ar: raw.title || getOrdinalIssueName(issueNumber), fr: "", en: "" },
      short: typeof raw.short === "object"
        ? raw.short
        : { ar: raw.short || "", fr: "", en: "" },
      image: raw.image || "",
      file: raw.file || "",
      filePath: raw.filePath || "",
      articles: articles.map((a, index) => ({
        id: String(a.id || uid()),
        title: typeof a.title === "object" ? a.title : { ar: a.title || `المقال ${index + 1}`, fr: "", en: "" },
        short: typeof a.short === "object" ? a.short : { ar: a.short || "", fr: "", en: "" },
        file: a.file || a.pdf || a.pdfUrl || "",
        filePath: a.filePath || "",
        createdAt: Number(a.createdAt || Date.now()),
        updatedAt: Number(a.updatedAt || a.createdAt || Date.now())
      })),
      createdAt: Number(raw.createdAt || Date.now()),
      updatedAt: Number(raw.updatedAt || raw.createdAt || Date.now()),
      status: raw.status || "published"
    };
  }

  function normalizeStandardItem(sectionKey, raw){
    const fixedSection = normalizeSectionKey(sectionKey || raw.section || (raw.type === "live" ? "live" : "research"));
    const normalizedId = String(raw.docId || raw.id || uid());

    return {
      id: normalizedId,
      docId: normalizedId,
      section: fixedSection,
      title: typeof raw.title === "object" ? raw.title : { ar: raw.title || "", fr:"", en:"" },
      short: typeof raw.short === "object" ? raw.short : { ar: raw.short || "", fr:"", en:"" },
      full: typeof raw.full === "object" ? raw.full : { ar: raw.full || "", fr:"", en:"" },
      details: typeof raw.details === "object" ? raw.details : { ar: raw.details || "", fr:"", en:"" },
      author: typeof raw.author === "object" ? raw.author : { ar: raw.author || "", fr:"", en:"" },
      affiliation: typeof raw.affiliation === "object" ? raw.affiliation : { ar: raw.affiliation || "", fr:"", en:"" },
      date: typeof raw.date === "object" ? raw.date : { ar: raw.date || "", fr:"", en:"" },
      image: raw.image || "",
      file: raw.file || raw.link || "",
      filePath: raw.filePath || "",
      createdAt: Number(raw.createdAt || Date.now()),
      updatedAt: Number(raw.updatedAt || raw.createdAt || Date.now()),
      status: raw.status || "published"
    };
  }

  function normalizeItem(sectionKey, raw){
    const fixedSection = normalizeSectionKey(sectionKey || raw.section);
    if (fixedSection === "editions") return normalizeEditionItem(raw);
    return normalizeStandardItem(fixedSection, raw);
  }

  function rebuildDbFromCache(){
    const all = getContentCache()
      .map(item => normalizeItem(item.section, item))
      .filter(item => SECTIONS.some(s => s.key === item.section));

    SECTIONS.forEach(s => {
      state.bySection[s.key] = all
        .filter(item => item.section === s.key)
        .sort((a, b) => Number(b.updatedAt || 0) - Number(a.updatedAt || 0));
    });
  }

async function uploadPdfToStorage(file, sectionKey, itemId){
  if (!storage || !ref || !uploadBytes || !getDownloadURL) {
    throw new Error("Firebase Storage غير متاح الآن.");
  }

  const safeName = file.name.replace(/[^\w.\-]+/g, "_");
  const filePath = `pdfs/${sectionKey}/${itemId}-${safeName}`;
  const storageRef = ref(storage, filePath);
  await uploadBytes(storageRef, file);
  const url = await getDownloadURL(storageRef);
  return { url, path: filePath };
}

async function uploadEditionArticlePdf(file, issueId, articleId){
  if (!storage || !ref || !uploadBytes || !getDownloadURL) {
    throw new Error("Firebase Storage غير متاح الآن.");
  }

  const safeName = file.name.replace(/[^\w.\-]+/g, "_");
  const filePath = `pdfs/editions/${issueId}/${articleId}-${safeName}`;
  const storageRef = ref(storage, filePath);
  await uploadBytes(storageRef, file);
  const url = await getDownloadURL(storageRef);
  return { url, path: filePath };
}

  function upsertLocal(sectionKey, obj){
    const all = getContentCache().map(item => normalizeItem(item.section, item));
    const normalized = normalizeItem(sectionKey, { ...obj, section: sectionKey });

    const filtered = all.filter(x => String(x.docId || x.id) !== String(normalized.docId || normalized.id));
    filtered.unshift(normalized);

    setContentCache(filtered);
    rebuildDbFromCache();
    state.editing = { key: null, id: null };
  }
async function upsertFirestore(sectionKey, obj){
  if (!db || !doc || !setDoc) {
    console.warn("Firestore unavailable, skipping remote save.");
    return obj;
  }

  const now = Date.now();
  const docIdValue = String(obj.docId || obj.id || uid());

  obj.id = docIdValue;
  obj.docId = docIdValue;
  obj.section = sectionKey;
  obj.updatedAt = now;
  if (!obj.createdAt) obj.createdAt = now;
  if (!obj.status) obj.status = "published";

  await setDoc(doc(db, "content", docIdValue), obj, { merge: true });
  return obj;
}

  async function saveItem(key){
    const cfg = SECTIONS.find(s => s.key === key);
    if (!cfg) return;

    if (key === "editions") {
      alert("قسم الإصدارات له نموذج خاص. استخدم أزرار حفظ العدد أو حفظ المقال.");
      return;
    }

    const isLive = !!cfg.isLive;
    const currentId = state.editing.key === key && state.editing.id ? state.editing.id : uid();
    const existing = (state.bySection[key] || []).find(x => String(x.id) === String(currentId));

    const obj = {
      id: currentId,
      docId: currentId,
      title: { ar: "", fr: "", en: "" },
      short: { ar: "", fr: "", en: "" },
      full: { ar: "", fr: "", en: "" },
      details: { ar: "", fr: "", en: "" },
      author: { ar: "", fr: "", en: "" },
      affiliation: { ar: "", fr: "", en: "" },
      date: { ar: "", fr: "", en: "" },
      image: existing?.image || "",
      file: existing?.file || "",
      filePath: existing?.filePath || ""
    };

    if (isLive) {
      const titleAr = el(`${key}-title-ar`)?.value.trim() || "";
      const shortAr = el(`${key}-short-ar`)?.value.trim() || "";
      const link = el(`${key}-live-link`)?.value.trim() || "";

      if (!titleAr) return alert("أدخل عنوان البث بالعربية أولاً");

      obj.title.ar = titleAr;
      obj.short.ar = shortAr;
      obj.file = link;
    } else {
      const titleAr = el(`${key}-title-ar`)?.value.trim() || "";
      if (!titleAr) return alert("أدخل العنوان بالعربية أولاً");

      obj.title.ar = titleAr;
      obj.author.ar = el(`${key}-author-ar`)?.value.trim() || "";
      obj.affiliation.ar = el(`${key}-aff-ar`)?.value.trim() || "";
      obj.date.ar = el(`${key}-date-ar`)?.value.trim() || "";
      obj.short.ar = el(`${key}-short-ar`)?.value.trim() || "";
      obj.full.ar = stripHtml(el(`${key}-full-ar-editor`)?.innerHTML || "");
      obj.details.ar = el(`${key}-details-ar`)?.value.trim() || "";

      const pdfInput = el(`${key}-pdf-file`);
      if (pdfInput && pdfInput.files && pdfInput.files[0]) {
        const pdfFile = pdfInput.files[0];
        if (pdfFile.type !== "application/pdf") {
          return alert("يرجى اختيار ملف PDF فقط");
        }

        setStatus("جارٍ رفع ملف PDF...");
        const uploaded = await uploadPdfToStorage(pdfFile, key, currentId);
        obj.file = uploaded.url;
        obj.filePath = uploaded.path;
      }

      const imgInput = el(`${key}-image`);
      if (imgInput && imgInput.files && imgInput.files[0]) {
        obj.image = await fileToDataURL(imgInput.files[0]);
      }
    }

    upsertLocal(key, obj);

    try {
      await upsertFirestore(key, obj);

  async function deleteItemById(sectionKey, id){

      await deleteCurrentIssue();
      return;
    }

    const ok = confirm("سيتم حذف العنصر. هل أنت متأكد؟");

    const target = (state.bySection[sectionKey] || []).find(x => String(x.docId || x.id) === String(id));

    const all = getContentCache().map(item => normalizeItem(item.section, item));
    const filtered = all.filter(x => String(x.docId || x.id) !== String(id));

    setContentCache(filtered);
    rebuildDbFromCache();
    renderList(sectionKey);

    try {
      await deleteDoc(doc(db, "content", String(id)));
    } catch (e) {
      console.error("Firestore delete error:", e);
    }

    try {
      if (target?.filePath) {
        await deleteObject(ref(storage, target.filePath));
      }
    } catch (e) {
      console.error("Storage delete error:", e);
    }

  function renderList(key){

      return t.includes(q) || s.includes(q) || d.includes(q);
    });

      const desc = descFull.length > 120 ? descFull.slice(0, 120) + "..." : descFull;
      const author = getByLang(item.author, "ar") || "—";

    if (!issues.length) return 1;

  }

  function refreshEditionSelect(selectedId = null){
    const select = el("editions-issue-select");

    select.innerHTML = "";

  async function saveEditionArticle(){
    const issue = getCurrentIssue();
    if (!issue) return alert("أنشئ عددًا أولًا أو اختر عددًا لإضافة المقال داخله.");

    const title = el("editions-article-title")?.value.trim() || "";
    const short = el("editions-article-short")?.value.trim() || "";
    const pdfInput = el("editions-article-pdf");

    if (!title) return alert("أدخل عنوان المقال أولًا.");

    let article = issue.articles.find(a => String(a.id) === String(state.editionsEditingArticleId));
    const isNew = !article;

    if (!article) {
      article = {
        id: uid(),
        title: { ar: "", fr:"", en:"" },
        short: { ar: "", fr:"", en:"" },
        file: "",
        filePath: "",
        createdAt: Date.now(),
        updatedAt: Date.now()
      };
      issue.articles.unshift(article);
    }

    article.title.ar = title;
    article.short.ar = short;
    article.updatedAt = Date.now();

    if (pdfInput && pdfInput.files && pdfInput.files[0]) {
      const pdfFile = pdfInput.files[0];
      if (pdfFile.type !== "application/pdf") {
        return alert("يرجى اختيار ملف PDF فقط");
      }
      setStatus("جارٍ رفع PDF للمقال...");
      const uploaded = await uploadEditionArticlePdf(pdfFile, issue.id, article.id);
      article.file = uploaded.url;
      article.filePath = uploaded.path;
    }

    if (!article.file) {
      return alert("ارفع ملف PDF للمقال أول مرة على الأقل.");
    }

    issue.updatedAt = Date.now();
    issue.title = { ar: getOrdinalIssueName(issue.issueNumber), fr:"", en:"" };

    upsertLocal("editions", issue);

    try {
      await upsertFirestore("editions", issue);
    } catch (err) {
      console.error("Edition article Firestore error:", err);
      alert("تم حفظ المقال محليًا لكن فشل الحفظ في Firestore");
    }

    state.editionsEditingIssueId = issue.id;
    state.editionsEditingArticleId = isNew ? null : article.id;
    refreshEditionSelect(issue.id);
    renderEditionsList();
    resetEditionArticleForm();
    setStatus("تم حفظ المقال داخل العدد بنجاح.");
  }

  async function removeEditionArticle(issueId, articleId){
    const issue = (state.bySection.editions || []).find(x => String(x.id) === String(issueId));

    const ok = confirm("سيتم حذف هذا المقال من العدد. هل أنت متأكد؟");

      await upsertFirestore("editions", issue);

      console.error("Remove edition article Firestore error:", err);

    try {
      if (target?.filePath) {
        await deleteObject(ref(storage, target.filePath));

async function reloadFromFirestore(){
  if (!db || !collection || !getDocs) {
    setStatus("Firebase غير متاح حاليًا، يعمل الأدمن في الوضع المحلي فقط.");
    return [];
  }

  try {
    setStatus("جارٍ تحميل البيانات من Firestore...");
    const snap = await getDocs(collection(db, "content"));
    const all = [];
    snap.forEach(docSnap => {
      const raw = { docId: docSnap.id, ...docSnap.data() };
      all.push(normalizeItem(raw.section, raw));
    });

    setContentCache(all);
    rebuildDbFromCache();
    showSection(state.currentSectionKey);
    setStatus(`تم تحميل ${all.length} عنصر من Firestore.`);
    return all;
  } catch (e) {
    console.error("Firestore load error:", e);
    setStatus("فشل تحميل البيانات من Firestore.");
    return [];
  }
}
async function recoverAllData(){
  setStatus("جارٍ استرجاع البيانات من Firestore والكاش المحلي...");
  let firestoreItems = [];
  let localItems = [];

  if (db && collection && getDocs) {
    try {
      const snap = await getDocs(collection(db, "content"));
      snap.forEach(docSnap => {
        const raw = { docId: docSnap.id, ...docSnap.data() };
        firestoreItems.push(normalizeItem(raw.section, raw));
      });
    } catch (e) {
      console.error("Firestore load error:", e);
    }
  }

  try {
    localItems = getContentCache().map(item => normalizeItem(item.section, item));
  } catch (e) {
    console.error("Local cache read error:", e);
  }

  const mergedMap = new Map();

  [...localItems, ...firestoreItems].forEach(item => {
    const id = String(item.docId || item.id || uid());
    const existing = mergedMap.get(id);

    if (!existing) {
      mergedMap.set(id, item);
      return;
    }

    const oldUpdated = Number(existing.updatedAt || 0);
    const newUpdated = Number(item.updatedAt || 0);

    if (newUpdated >= oldUpdated) mergedMap.set(id, item);
  });

  const merged = Array.from(mergedMap.values());
  setContentCache(merged);
  rebuildDbFromCache();
  showSection(state.currentSectionKey);
  setStatus(`تم دمج ${merged.length} عنصر.`);
}

    rebuildDbFromCache();
    showSection(state.currentSectionKey);
    await recoverAllData();

    if (el("logoutBtn")) el("logoutBtn").addEventListener("click", logout);
    if (el("reloadBtn")) el("reloadBtn").addEventListener("click", reloadFromFirestore);
if (el("recoverBtn")) {
  el("recoverBtn").addEventListener("click", async () => {
    await recoverAllData();
    await syncLocalCacheToFirestore();
    await reloadFromFirestore();
  });
}
    if (el("exportBtn")) el("exportBtn").addEventListener("click", exportJSON);
    if (el("clearBtn")) el("clearBtn").addEventListener("click", clearLocalStorageOnly);
  }

window.addEventListener("load", async () => {
  try {
    const app = el("app");
    if (app) {
      app.style.display = "grid";
      app.classList.add("visible");
    }

    rebuildDbFromCache();
    buildMenu();
    showSection(state.currentSectionKey);
    setStatus("جاهز.");

    try {
      await reloadFromFirestore();
    } catch (e) {
      console.warn("Firestore reload skipped:", e);
      setStatus("تم فتح الأدمن محليًا بدون مزامنة Firestore.");
    }
  } catch (err) {
    console.error("Startup error:", err);
    const content = el("content");
    if (content) {
      content.innerHTML = `
        <div class="card">
          <h3>حدث خطأ أثناء تشغيل لوحة التحكم</h3>
          <div class="muted-note">افتح Console لمعرفة السطر المسبب للمشكلة.</div>
        </div>
      `;
    }
  }
});
</script>
