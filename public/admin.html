<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة التحكم - Ofouq Academy</title>

  <link rel="icon" type="image/png" href="images/ofouq-logo.jpeg" />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet" />

  <style>
    :root{
      --accent:#0ea5e9;
      --accent2:#22c55e;
      --bg1:#020617;
      --bg2:#0b1120;
      --card: rgba(15,23,42,.86);
      --card2: rgba(15,23,42,.92);
      --text:#e5e7eb;
      --muted:#94a3b8;
      --border: rgba(148,163,184,.26);
      --danger:#ef4444;
      --shadow: 0 18px 45px rgba(15,23,42,.65);
      --r:18px;
      --t: .18s ease;
    }
    *{ box-sizing:border-box; }
    html,body{ width:100%; overflow-x:hidden; }
    body{
      margin:0;
      font-family:"Tajawal",sans-serif;
      background: radial-gradient(circle at top left, var(--bg2) 0%, var(--bg1) 55%, #000 100%);
      color:var(--text);
      line-height:1.65;
      -webkit-font-smoothing:antialiased;
    }

    /* Login overlay */
    .lock{
      position:fixed; inset:0;
      display:flex; align-items:center; justify-content:center;
      padding:18px;
      background: radial-gradient(circle at top, #0f172a 0%, #020617 55%, #000 100%);
      z-index:9999;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      transition: opacity .24s ease, visibility .24s ease;
    }
    .lock.hidden{ opacity:0; visibility:hidden; }
    .lock-card{
      width:min(420px, 100%);
      background: linear-gradient(135deg, rgba(15,23,42,.94), rgba(15,23,42,.76));
      border:1px solid rgba(148,163,184,.38);
      border-radius:22px;
      box-shadow: var(--shadow);
      padding:22px 18px 18px;
      position:relative;
      overflow:hidden;
    }
    .lock-card:before{
      content:"";
      position:absolute;
      width:180px; height:180px;
      top:-70px; left:-60px;
      background: radial-gradient(circle, rgba(56,189,248,.35), transparent 60%);
      opacity:.9;
      pointer-events:none;
    }
    .lock-title{
      margin:0 0 6px;
      font-size:20px;
      display:flex; align-items:center; gap:8px;
      color:#e0f2fe;
    }
    .lock-title i{ color:#38bdf8; font-size:22px; }
    .lock-desc{
      margin:0 0 16px;
      color:var(--muted);
      font-size:13px;
    }
    .in{
      position:relative;
      margin-bottom:10px;
    }
    .in i{
      position:absolute;
      left:12px;
      top:50%;
      transform:translateY(-50%);
      color:#64748b;
      font-size:18px;
    }
    .in input{
      width:100%;
      padding:10px 14px 10px 42px;
      border-radius:999px;
      border:1px solid rgba(148,163,184,.45);
      background: rgba(15,23,42,.92);
      color:var(--text);
      outline:none;
      transition: border-color var(--t), box-shadow var(--t), transform var(--t);
      font-size:14px;
    }
    .in input:focus{
      border-color: var(--accent);
      box-shadow:0 0 0 1px rgba(56,189,248,.4);
      transform: translateY(-1px);
    }
    .btn{
      border:0;
      border-radius:999px;
      padding:10px 14px;
      cursor:pointer;
      font-weight:800;
      font-size:14px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      transition: transform .12s ease, filter .12s ease, box-shadow .12s ease;
      user-select:none;
      white-space:nowrap;
    }
    .btn:active{ transform:translateY(0); }
    .btn-primary{
      width:100%;
      background: linear-gradient(135deg, var(--accent), #22c1c3);
      color:#07101f;
      box-shadow:0 12px 30px rgba(56,189,248,.33);
    }
    .btn-primary:hover{
      filter: brightness(1.03);
      transform: translateY(-1px);
      box-shadow:0 16px 40px rgba(56,189,248,.44);
    }
    .err{
      margin-top:10px;
      display:none;
      color: var(--danger);
      font-size:13px;
    }

    /* App layout */
    .app{
      display:none;
      min-height:100vh;
      gap:14px;
      padding:14px;
      grid-template-columns: clamp(240px, 25vw, 290px) 1fr;
      opacity:0;
      transform: translateY(10px);
      transition: opacity .24s ease, transform .24s ease;
    }
    .app.visible{ opacity:1; transform: translateY(0); display:grid; }

    .sidebar{
      background: rgba(15,23,42,.74);
      border:1px solid var(--border);
      border-radius:20px;
      box-shadow: var(--shadow);
      padding:16px 14px;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      display:flex;
      flex-direction:column;
      overflow:hidden;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      padding-bottom:12px;
      border-bottom:1px dashed rgba(148,163,184,.28);
      margin-bottom:10px;
    }
    .logo{
      width:42px; height:42px;
      border-radius:14px;
      background: radial-gradient(circle at top, #38bdf8, #0ea5e9);
      display:flex; align-items:center; justify-content:center;
      color:#06101f;
      font-weight:900;
      letter-spacing:.03em;
    }
    .brand h1{
      margin:0;
      font-size:13px;
      letter-spacing:.12em;
      text-transform: uppercase;
      color:#cbd5e1;
    }
    .brand p{
      margin:2px 0 0;
      font-size:11px;
      color:#94a3b8;
    }
    .menu{
      flex:1;
      overflow:auto;
      padding-left:2px;
      scrollbar-width: thin;
      scrollbar-color: rgba(148,163,184,.35) transparent;
    }
    .menu::-webkit-scrollbar{ width:4px; }
    .menu::-webkit-scrollbar-thumb{ background: rgba(148,163,184,.35); border-radius:999px; }
    .menu button{
      width:100%;
      border:0;
      background:transparent;
      color:var(--text);
      text-align:right;
      padding:8px 10px;
      border-radius:999px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      cursor:pointer;
      font-weight:700;
      font-size:13px;
      transition: background var(--t), transform .1s ease, box-shadow var(--t);
      margin-bottom:6px;
    }
    .menu button span{
      display:flex; align-items:center; gap:8px;
    }
    .menu button i{ font-size:16px; opacity:.92; }
    .menu button:hover{
      background: rgba(15,23,42,.92);
      transform: translateY(-1px);
      box-shadow:0 10px 24px rgba(15,23,42,.7);
    }
    .menu button.active{
      background: rgba(15,23,42,1);
      box-shadow:0 12px 26px rgba(15,23,42,.85);
      border:1px solid rgba(56,189,248,.25);
    }
    .sidebar-footer{
      padding-top:10px;
      border-top:1px dashed rgba(148,163,184,.28);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      flex-wrap:wrap;
      color:#64748b;
      font-size:11px;
    }
    .btn-ghost{
      background: rgba(15,23,42,.9);
      border:1px solid rgba(148,163,184,.38);
      color:var(--text);
      box-shadow:0 8px 18px rgba(15,23,42,.6);
      padding:6px 10px;
      font-size:12px;
      font-weight:800;
    }
    .btn-ghost:hover{ transform: translateY(-1px); background: rgba(15,23,42,1); }

    main{
      overflow:auto;
      padding:2px 0 2px 2px;
    }
    .topbar{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
      padding:8px 6px 14px;
    }
    .title{
      display:flex;
      align-items:center;
      gap:10px;
      margin:0;
      color:#e0f2fe;
      font-size:20px;
    }
    .badge{
      width:28px; height:28px;
      border-radius:999px;
      display:inline-flex; align-items:center; justify-content:center;
      background: rgba(15,23,42,.92);
      border:1px solid rgba(148,163,184,.35);
      color:#7dd3fc;
      font-size:15px;
    }
    .subtitle{
      margin:4px 0 0;
      font-size:12px;
      color:#64748b;
    }

    .controls{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
    }
    .btn-small{ padding:7px 12px; font-size:12px; font-weight:900; }
    .btn-green{
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color:#04101f;
      box-shadow:0 12px 26px rgba(34,197,94,.25);
    }

    .card{
      background: var(--card);
      border:1px solid rgba(148,163,184,.28);
      border-radius: var(--r);
      box-shadow: var(--shadow);
      padding:14px;
      margin-bottom:12px;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }
    .card h3{
      margin:0 0 10px;
      font-size:15px;
      display:flex; align-items:center; gap:8px;
      color:var(--text);
    }
    .card h3 i{ color:#38bdf8; font-size:18px; }

    .grid-2{
      display:grid;
      gap:12px;
      grid-template-columns: 1.6fr 1fr;
      align-items:start;
    }
    .row{ margin-bottom:10px; }
    label{
      display:block;
      margin-bottom:4px;
      color:#9ca3af;
      font-weight:800;
      font-size:12px;
    }
    input[type="text"], input[type="url"], input[type="search"], textarea, select{
      width:100%;
      padding:9px 10px;
      border-radius:12px;
      border:1px solid rgba(148,163,184,.45);
      background: rgba(15,23,42,.95);
      color:var(--text);
      outline:none;
      transition: border-color var(--t), box-shadow var(--t), transform var(--t);
      font-size:13px;
      font-family:inherit;
    }
    textarea{ min-height:80px; resize:vertical; }
    input:focus, textarea:focus, select:focus{
      border-color: var(--accent);
      box-shadow:0 0 0 1px rgba(56,189,248,.35);
      transform: translateY(-1px);
    }
    input[type="file"]{
      width:100%;
      padding:7px 10px;
      border-radius:12px;
      border:1px solid rgba(148,163,184,.45);
      background: rgba(15,23,42,.95);
      color:var(--muted);
      font-size:12px;
    }

    .toolbar{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
      margin:8px 0 6px;
      padding:6px;
      border-radius:999px;
      background: rgba(15,23,42,.9);
      border:1px solid rgba(148,163,184,.35);
    }
    .tool{
      border:0;
      background:transparent;
      color:var(--text);
      padding:6px 9px;
      border-radius:999px;
      cursor:pointer;
      transition: background var(--t), transform .1s ease;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:6px;
    }
    .tool:hover{ background: rgba(15,23,42,1); transform: translateY(-1px); color:#7dd3fc; }
    .editor{
      min-height:130px;
      border-radius:12px;
      border:1px solid rgba(148,163,184,.45);
      padding:10px;
      background: rgba(15,23,42,.95);
      outline:none;
      overflow:auto;
      font-size:13px;
    }
    .preview{
      margin-top:8px;
      font-size:12px;
      color:#93a3b8;
    }
    .preview img{
      width:100%;
      height:160px;
      object-fit:cover;
      border-radius:12px;
      border:1px solid rgba(148,163,184,.3);
      display:block;
      margin-top:8px;
    }

    .actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:10px;
    }

    .list-head{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
      justify-content:space-between;
      margin-bottom:10px;
    }
    .list-head .left{
      display:flex; gap:8px; flex-wrap:wrap; align-items:center;
    }
    .pill{
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(148,163,184,.35);
      background: rgba(15,23,42,.82);
      color:#cbd5e1;
      font-size:12px;
      font-weight:900;
    }
    .list{
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap:10px;
    }
    .item{
      background: var(--card2);
      border:1px solid rgba(148,163,184,.35);
      border-radius:16px;
      overflow:hidden;
      position:relative;
      box-shadow:0 12px 28px rgba(15,23,42,.72);
      transition: transform .12s ease, box-shadow .12s ease, border-color .12s ease;
    }
    .item:hover{
      transform: translateY(-2px);
      border-color: rgba(56,189,248,.45);
      box-shadow:0 16px 34px rgba(15,23,42,.82);
    }
    .item img{
      width:100%;
      height:120px;
      object-fit:cover;
      display:block;
      border-bottom:1px solid rgba(148,163,184,.25);
    }
    .item-body{ padding:10px; }
    .item-title{
      margin:0 0 6px;
      font-size:14px;
      color:#e2f3ff;
      font-weight:900;
    }
    .item-desc{
      margin:0 0 8px;
      font-size:12px;
      color:#9ca3af;
      display:-webkit-box;
      -webkit-line-clamp:3;
      -webkit-box-orient: vertical;
      overflow:hidden;
      min-height:48px;
    }
    .item-meta{
      font-size:10px;
      color:#94a3b8;
      display:flex;
      justify-content:space-between;
      gap:8px;
      flex-wrap:wrap;
    }
    .item-actions{
      position:absolute;
      top:8px;
      left:8px;
      display:flex;
      gap:6px;
      z-index:2;
    }
    .mini{
      border:0;
      border-radius:999px;
      padding:6px 8px;
      cursor:pointer;
      font-size:11px;
      font-weight:900;
      background: rgba(15,23,42,.92);
      color:#e5e7eb;
      border:1px solid rgba(148,163,184,.35);
      transition: transform .1s ease, background var(--t), border-color var(--t);
    }
    .mini:hover{ transform: translateY(-1px); border-color: rgba(56,189,248,.45); }
    .mini.danger{ color:#fecaca; border-color: rgba(239,68,68,.35); }
    .mini.danger:hover{ border-color: rgba(239,68,68,.6); }

    .empty{
      padding:24px 10px;
      text-align:center;
      color:#6b7280;
      font-size:13px;
      border:1px dashed rgba(148,163,184,.28);
      border-radius:16px;
      background: rgba(15,23,42,.55);
    }

    @media (max-width: 980px){
      .app{ grid-template-columns: 1fr; padding:12px; }
      .sidebar{ flex-direction:row; gap:10px; align-items:flex-start; }
      .menu{ display:flex; gap:8px; overflow:auto; padding:0; }
      .menu button{ flex:0 0 auto; white-space:nowrap; margin:0; }
      .grid-2{ grid-template-columns:1fr; }
    }
  </style>
</head>

<body>
  <!-- شاشة القفل -->
  <div id="lock" class="lock">
    <div class="lock-card">
      <h2 class="lock-title"><i class="ri-shield-user-line"></i> تسجيل دخول الإدارة</h2>
      <p class="lock-desc">أدخل كود الإدارة وكلمة المرور لفتح لوحة التحكم.</p>

      <div class="in">
        <i class="ri-user-3-line"></i>
        <input id="adminCode" type="text" placeholder="كود الإدارة" autocomplete="off" />
      </div>

      <div class="in">
        <i class="ri-lock-password-line"></i>
        <input id="adminPass" type="password" placeholder="كلمة المرور" autocomplete="off" />
      </div>

      <button class="btn btn-primary" id="loginBtn" type="button">
        دخول <i class="ri-arrow-left-line"></i>
      </button>

      <div id="loginErr" class="err">بيانات الدخول غير صحيحة.</div>
    </div>
  </div>

  <!-- التطبيق -->
  <div class="app" id="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="logo">AD</div>
        <div>
          <h1>ADMIN PANEL</h1>
          <p>لوحة التحكم - Ofouq Academy</p>
        </div>
      </div>

      <nav class="menu" id="menu" aria-label="الأقسام">
        <!-- سيتم حقن الأزرار من JS -->
      </nav>

      <div class="sidebar-footer">
        <span>تم التطوير لصالح المنصة</span>
        <button class="btn btn-ghost" id="logoutBtn" type="button">
          <i class="ri-logout-circle-line"></i> خروج
        </button>
      </div>
    </aside>

    <main>
      <div class="topbar">
        <div>
          <h2 class="title">
            <span class="badge"><i class="ri-layout-row-line"></i></span>
            <span id="sectionTitle">الأبحاث المحكمة</span>
          </h2>
          <div class="subtitle">أضف/عدّل/احذف المحتوى، وسيتم التحديث في Firestore و localStorage.</div>
        </div>

        <div class="controls">
          <button class="btn btn-ghost btn-small" id="reloadBtn" type="button">
            <i class="ri-refresh-line"></i> تحديث من Firestore
          </button>
          <button class="btn btn-ghost btn-small" id="exportBtn" type="button">
            <i class="ri-download-cloud-2-line"></i> تصدير JSON
          </button>
          <button class="btn btn-ghost btn-small" id="clearBtn" type="button">
            <i class="ri-database-2-line"></i> مسح localStorage
          </button>
          <button class="btn btn-small btn-green" id="syncBtn" type="button">
            <i class="ri-cloud-line"></i> مزامنة (Firestore → localStorage)
          </button>
        </div>
      </div>

      <!-- منطقة المحتوى -->
      <div id="content">
        <!-- سيتم توليد الفورم + قائمة العناصر من JS -->
      </div>
    </main>
  </div>

  <!-- ملاحظة: هذا الملف يعتمد على firestore-bridge.js مثل مشروعك الحالي -->
<script type="module" src="public/firestore-bridge.js"></script>

  <!-- الجزء 2/3 سيضع هنا سكربت JS الرئيسي -->
  <script>
    // (سيتم استبداله بالكامل في الجزء 2/3)
  </script>
</body>
</html>
<script>
/* ========= إعدادات الدخول (كما طلبت) ========= */
const ADMIN_CODE = "admin";
const ADMIN_PASS = "ofouqaca12";

/* ========= الأقسام ========= */
const SECTIONS = [
  { key: "research",               title: "الأبحاث المحكمة",                 icon: "ri-file-text-line",      allowFile: true },
  { key: "articles",               title: "المقالات العلمية",                icon: "ri-file-paper-line",     allowFile: true },
  { key: "files",                  title: "الملفات البحثية",                 icon: "ri-folder-3-line",       allowFile: true },
  { key: "general-articles",       title: "مقالات عامة",                     icon: "ri-newspaper-line",      allowFile: true },
  { key: "foreign-articles",       title: "مقالات أجنبية",                   icon: "ri-article-line",        allowFile: true },

  { key: "special-politics",       title: "تخصص: العلوم السياسية",            icon: "ri-government-line",     allowFile: true },
  { key: "special-ir",             title: "تخصص: العلاقات الدولية",           icon: "ri-global-line",         allowFile: true },
  { key: "special-admin-law",      title: "تخصص: القانون الإداري",            icon: "ri-briefcase-4-line",    allowFile: true },
  { key: "special-const-law",      title: "تخصص: القانون الدستوري",           icon: "ri-balance-line",        allowFile: true },
  { key: "special-public-policy",  title: "تخصص: السياسات العامة",            icon: "ri-community-line",      allowFile: true },

  { key: "editions",               title: "الإصدارات",                       icon: "ri-book-open-line",      allowFile: true },
  { key: "activities",             title: "الأنشطة",                         icon: "ri-calendar-2-line",      allowFile: true },
  { key: "talks",                  title: "الندوات/الحوارات",                icon: "ri-voiceprint-line",     allowFile: true },
  { key: "training",               title: "التكوين/الدورات",                 icon: "ri-train-line",          allowFile: true },
  { key: "live",                   title: "البث المباشر",                    icon: "ri-live-line",           allowFile: false, isLive: true },
];

const db = {};
SECTIONS.forEach(s => db[s.key] = safeParse(localStorage.getItem(s.key), []));

let currentSectionKey = "research";
let editing = { key: null, id: null };

/* ========= أدوات صغيرة ========= */
function safeParse(v, fallback){
  try { const x = JSON.parse(v); return Array.isArray(x) ? x : fallback; }
  catch { return fallback; }
}
function uid(){ return Date.now() + Math.floor(Math.random() * 999); }
function el(id){ return document.getElementById(id); }
function esc(s){ return String(s ?? "").replace(/[&<>"']/g, m => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;" }[m])); }

function getByLang(field, lang="ar"){
  if (!field) return "";
  if (typeof field === "string") return field;
  return field[lang] || field.ar || field.fr || field.en || "";
}

function setAppVisible(){
  el("lock").classList.add("hidden");
  setTimeout(()=>{ el("lock").style.display = "none"; }, 220);
  const app = el("app");
  app.style.display = "grid";
  requestAnimationFrame(()=> app.classList.add("visible"));
}

function setLockVisible(){
  const app = el("app");
  app.classList.remove("visible");
  setTimeout(()=>{ app.style.display = "none"; }, 180);
  el("lock").style.display = "flex";
  requestAnimationFrame(()=> el("lock").classList.remove("hidden"));
}

function requireFs(){
  if (!window.fs || !window.fs.collection || !window.fs.getDocs) {
    alert("Firestore غير جاهز. تأكد من firestore-bridge.js");
    return false;
  }

}

function bindPreviewHandlers(key){
  const cfg = SECTIONS.find(s=>s.key===key);
  if (cfg?.isLive) return;

  const imgInput = el(`${key}-image`);
  const vidInput = el(`${key}-video`);
  const preview = el(`${key}-preview`);

  if (imgInput){
    imgInput.addEventListener("change", ()=>{

      const url = URL.createObjectURL(imgInput.files[0]);
      preview.innerHTML = `<div>معاينة الصورة:</div><img src="${url}" alt="preview" />`;
    });
  }

  if (vidInput){
    vidInput.addEventListener("change", ()=>{
      if (!vidInput.files || !vidInput.files[0]) return;
      const file = vidInput.files[0];
      const url = URL.createObjectURL(file);
      const sizeMB = (file.size / (1024*1024)).toFixed(1);
      preview.innerHTML = `

        <video controls style="width:100%; border-radius:12px; border:1px solid rgba(148,163,184,.35); max-height:260px;">

        </video>
        <div style="margin-top:6px; color:#94a3b8;">${esc(file.name)} — ${sizeMB}MB</div>
      `;
    });
  }
}

/* ========= رفع فيديو للسيرفر المحلي (كما مشروعك الحالي) ========= */
async function uploadVideoToServer(file){
  const formData = new FormData();
  formData.append("video", file);

  const res = await fetch("http://localhost:3000/upload-video", {
    method: "POST",
    body: formData
  });

  if (!res.ok) throw new Error("فشل رفع الفيديو");
  const data = await res.json();
  if (!data || !data.url) throw new Error("السيرفر لم يرجع رابط الفيديو");
  return data.url; // مثال: videos/xxx.mp4
}

/* ========= CRUD: حفظ ========= */
async function saveItem(key){
  const cfg = SECTIONS.find(s=>s.key===key);
  if (!cfg) return;

  if (!requireFs()) return;

  const isLive = !!cfg.isLive;

  let obj = {
    id: editing.key === key && editing.id ? editing.id : uid(),
    title: { ar:"", fr:"", en:"" },
    short: { ar:"", fr:"", en:"" },
    full:  { ar:"", fr:"", en:"" },
    details:{ ar:"", fr:"", en:"" },
    author:{ ar:"", fr:"", en:"" },
    affiliation:{ ar:"", fr:"", en:"" },
    date:{ ar:"", fr:"", en:"" },
    image: "",
    file: ""
  };

  if (isLive){
    const titleAr = el(`${key}-title-ar`)?.value.trim();
    const shortAr = el(`${key}-short-ar`)?.value.trim();
    const link = el(`${key}-live-link`)?.value.trim();

    if (!titleAr) return alert("اكتب عنوان البث (عربي).");
    if (!link) return alert("ضع رابط البث.");

    obj.title.ar = titleAr;
    obj.short.ar = shortAr;
    obj.file = link;
  } else {
    const titleAr = el(`${key}-title-ar`)?.value.trim();
    const titleFr = el(`${key}-title-fr`)?.value.trim();
    const titleEn = el(`${key}-title-en`)?.value.trim();

    if (!titleAr || !titleFr || !titleEn) return alert("الرجاء إدخال العنوان بالعربية + الفرنسية + الإنجليزية.");

    obj.title = { ar:titleAr, fr:titleFr, en:titleEn };

    obj.short = {
      ar: el(`${key}-short-ar`)?.value.trim() || "",
      fr: el(`${key}-short-fr`)?.value.trim() || "",
      en: el(`${key}-short-en`)?.value.trim() || ""
    };

    obj.full = {
      ar: (el(`${key}-full-ar-editor`)?.innerHTML || "").trim(),
      fr: el(`${key}-full-fr`)?.value.trim() || "",
      en: el(`${key}-full-en`)?.value.trim() || ""
    };

    obj.details = {
      ar: el(`${key}-details-ar`)?.value.trim() || "",
      fr: el(`${key}-details-fr`)?.value.trim() || "",
      en: el(`${key}-details-en`)?.value.trim() || ""
    };

    obj.author = {
      ar: el(`${key}-author-ar`)?.value.trim() || "",
      fr: el(`${key}-author-fr`)?.value.trim() || "",
      en: el(`${key}-author-en`)?.value.trim() || ""
    };

    obj.affiliation = {
      ar: el(`${key}-aff-ar`)?.value.trim() || "",
      fr: el(`${key}-aff-fr`)?.value.trim() || "",
      en: el(`${key}-aff-en`)?.value.trim() || ""
    };

    obj.date = {
      ar: el(`${key}-date-ar`)?.value.trim() || "",
      fr: el(`${key}-date-fr`)?.value.trim() || "",
      en: el(`${key}-date-en`)?.value.trim() || ""
    };

    const externalUrl = el(`${key}-file-url`)?.value.trim() || "";

    const imgInput = el(`${key}-image`);
    const vidInput = el(`${key}-video`);

    try{
      if (imgInput && imgInput.files && imgInput.files[0]){
        const imgFile = imgInput.files[0];
        if (imgFile.size > 6 * 1024 * 1024){
          const ok = confirm("الصورة أكبر من 6MB، هل تريد المتابعة؟ (قد تكون ثقيلة)");
          if (!ok) return;
        }
        obj.image = await fileToDataURL(imgFile);
      }

      if (externalUrl){
        obj.file = externalUrl;
      } else if (vidInput && vidInput.files && vidInput.files[0]){
        const vFile = vidInput.files[0];
        const sizeMB = (vFile.size / (1024*1024)).toFixed(1);
        const ok = confirm(`حجم الفيديو ${sizeMB}MB. هل تريد رفعه للسيرفر الآن؟`);
        if (!ok) return;
        obj.file = await uploadVideoToServer(vFile);
      }
    }catch(err){
      console.error(err);
      alert("حدث خطأ أثناء تجهيز الملفات/رفع الفيديو.");
      return;
    }
  }

  // دمج مع عنصر سابق أثناء التعديل (حتى لا نفقد صورة/ملف إذا لم يرفعهما)
  if (editing.key === key && editing.id){
    const old = db[key].find(x=>x.id === editing.id);
    if (old){
      if (!obj.image) obj.image = old.image || "";
      if (!obj.file) obj.file = old.file || "";
    }
  }

  // 1) تحديث الذاكرة المحلية db + localStorage (ليظهر في الموقع) [file:191]
  upsertLocal(key, obj);

  // 2) حفظ في Firestore لكل الأقسام (بدون استثناء research) [مشكلة الاستثناء كانت موجودة في كودك القديم] [file:193]
  try{
    await upsertFirestore(key, obj);
  }catch(err){
    console.error(err);
    alert("تم الحفظ محليًا لكن فشل الحفظ في Firestore. راجع القواعد/الاتصال.");
    return;
  }

  resetForm(key);
  renderList(key);
  alert("تم الحفظ بنجاح ✅");
}

/* ========= تحويل ملف لصورة base64 ========= */
function fileToDataURL(file){
  return new Promise((resolve, reject)=>{
    const r = new FileReader();
    r.onload = e => resolve(e.target.result);
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}

/* ========= upsert localStorage ========= */
function upsertLocal(key, obj){
  const arr = db[key] || (db[key] = []);
  const idx = arr.findIndex(x=>x.id === obj.id);
  if (idx >= 0) arr[idx] = obj;
  else arr.unshift(obj);

  localStorage.setItem(key, JSON.stringify(arr));
  editing = { key: null, id: null };
}

/* ========= upsert Firestore (FIXED: no where/query/addDoc) ========= */
async function upsertFirestore(collectionKey, obj){
  const col = window.fs.collection(window.fs.db, collectionKey);

  // نحاول update إن كانت دوال updateDoc موجودة
  if (window.fs.updateDoc && window.fs.doc){
    try{
      const docId = String(obj.id);
      const docRef = window.fs.doc(window.fs.db, collectionKey, docId);
      await window.fs.updateDoc(docRef, obj);
      return;
    }catch(e){
      // لو الوثيقة غير موجودة أو فشل التحديث، سنسقط إلى addDoc
      console.warn("updateDoc failed, fallback to addDoc", e);
    }
  }

  if (!window.fs.addDoc) throw new Error("addDoc غير موجودة في window.fs");

  const ref = await window.fs.addDoc(col, obj);
  obj.docId = ref?.id || null;

  // خزّن docId محليًا إن رجع
  const idx = (db[collectionKey] || []).findIndex(x => x.id === obj.id);
  if (idx >= 0 && obj.docId) db[collectionKey][idx].docId = obj.docId;
  localStorage.setItem(collectionKey, JSON.stringify(db[collectionKey] || []));
}


/* ========= حذف (FIXED: delete by docId = id) ========= */
async function deleteItem(key, id){
  const ok = confirm("هل تريد حذف هذا العنصر؟ (سيُحذف من localStorage و Firestore)");
  if (!ok) return;

  // حذف محلي
  db[key] = (db[key] || []).filter(x => x.id !== id);
  localStorage.setItem(key, JSON.stringify(db[key]));
  renderList(key);

  // حذف من Firestore
  if (!requireFs()) return;

  try{
    const docId = String(id); // نفس القاعدة: docId = id
    await window.fs.deleteDoc(window.fs.doc(window.fs.db, key, docId));
  }catch(e){
    console.error(e);
    alert("تم الحذف محليًا، لكن تعذر الحذف من Firestore.");
  }
}

/* ========= تفريغ الفورم ========= */
function resetForm(key){
  editing = { key: null, id: null };

  const cfg = SECTIONS.find(s=>s.key===key);
  if (cfg?.isLive){
    el(`${key}-title-ar`).value = "";
    el(`${key}-short-ar`).value = "";
    el(`${key}-live-link`).value = "";
    const p = el(`${key}-preview`); if (p) p.innerHTML = "";
    return;
  }

  ["ar","fr","en"].forEach(lang=>{
    const t = el(`${key}-title-${lang}`); if (t) t.value = "";
    const a = el(`${key}-author-${lang}`); if (a) a.value = "";
    const aff = el(`${key}-aff-${lang}`); if (aff) aff.value = "";
    const d = el(`${key}-date-${lang}`); if (d) d.value = "";
    const s = el(`${key}-short-${lang}`); if (s) s.value = "";
    const det = el(`${key}-details-${lang}`); if (det) det.value = "";
    const f = el(`${key}-full-${lang}`); if (f) f.value = "";
  });

  const ed = el(`${key}-full-ar-editor`); if (ed) ed.innerHTML = "";
  const fileUrl = el(`${key}-file-url`); if (fileUrl) fileUrl.value = "";

  const img = el(`${key}-image`); if (img) img.value = "";
  const vid = el(`${key}-video`); if (vid) vid.value = "";

  const p = el(`${key}-preview`); if (p) p.innerHTML = "";
}

/* ========= عرض قائمة العناصر ========= */
function renderList(key){
  const list = el(`${key}-list`);
  const count = el(`${key}-count`);
  if (!list || !count) return;

  const q = (el(`${key}-search`)?.value || "").trim().toLowerCase();
  const data = (db[key] || []).filter(item=>{
    if (!q) return true;
    const t = (getByLang(item.title,"ar") + " " + getByLang(item.title,"fr") + " " + getByLang(item.title,"en")).toLowerCase();
    const s = (getByLang(item.short,"ar") + " " + getByLang(item.short,"fr") + " " + getByLang(item.short,"en")).toLowerCase();
    return t.includes(q) || s.includes(q);
  });

  count.textContent = `${data.length} عنصر`;

  if (!data.length){
    list.innerHTML = `<div class="empty">لا توجد عناصر هنا بعد.</div>`;
    return;
  }

  list.innerHTML = "";
  data.forEach(item=>{
    const title = getByLang(item.title,"ar") || "بدون عنوان";
    const descFull = getByLang(item.short,"ar") || getByLang(item.details,"ar") || "";
    const desc = descFull.length > 120 ? descFull.slice(0,120) + "..." : descFull;

    const author = getByLang(item.author,"ar") || "—";
    const dateLabel = getByLang(item.date,"ar") || new Date(item.id).toLocaleString("ar-EG");

    const hasImg = !!item.image;
    const imgHtml = hasImg ? `<img src="${item.image}" alt="img">` : `<img src="images/ofouq-logo.jpeg" alt="logo">`;

    const wrap = document.createElement("div");
    wrap.className = "item";
    wrap.innerHTML = `
      <div class="item-actions">
        <button class="mini" title="تعديل" onclick="loadForEdit('${key}', ${item.id})"><i class="ri-edit-box-line"></i></button>
        <button class="mini danger" title="حذف" onclick="deleteItem('${key}', ${item.id})"><i class="ri-delete-bin-line"></i></button>
      </div>
      ${imgHtml}
      <div class="item-body">
        <div class="item-title">${esc(title)}</div>
        <div class="item-desc">${esc(desc || "—")}</div>
        <div class="item-meta">
          <span>${esc(author)}</span>
          <span>${esc(dateLabel)}</span>
        </div>
      </div>
    `;
    list.appendChild(wrap);
  });
}

/* ========= مزامنة من Firestore → localStorage لكل الأقسام ========= */
async function reloadFromFirestore(allSections = true){
  if (!requireFs()) return;

  const keys = allSections ? SECTIONS.map(s => s.key) : [currentSectionKey];

  for (const key of keys){
    try{
      const col = window.fs.collection(window.fs.db, key);
      const snap = await window.fs.getDocs(col);

      const arr = [];
      snap.forEach(docSnap => {
        const data = docSnap.data() || {};
        // docId هنا هو نفس Document ID (قد يكون = id إذا طبقنا upsert الجديد)
        arr.push({ docId: docSnap.id, ...data });
      });

      // ترتيب محلي: الأحدث أولاً حسب id
      arr.sort((a, b) => (Number(b.id) || 0) - (Number(a.id) || 0));

      db[key] = arr;
      localStorage.setItem(key, JSON.stringify(arr));
    }catch(e){
      console.error("Firestore load error", key, e);
    }
  }

  renderList(currentSectionKey);
  alert(allSections ? "تمت مزامنة كل الأقسام من Firestore." : "تم تحديث القسم الحالي من Firestore.");
}

/* ========= تصدير JSON ========= */
function exportJSON(){
  const out = {};
  SECTIONS.forEach(s=> out[s.key] = db[s.key] || []);
  const blob = new Blob([JSON.stringify(out, null, 2)], { type:"application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "site-data.json";
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

/* ========= مسح localStorage (فقط) ========= */
function clearLocalStorage(){
  const ok = confirm("سيتم حذف بيانات الأقسام من localStorage فقط. هل أنت متأكد؟");
  if (!ok) return;
  SECTIONS.forEach(s=>{
    localStorage.removeItem(s.key);
    db[s.key] = [];
  });
  showSection("research");
  alert("تم مسح localStorage.");
}

/* 1) Override deleteItem: local + Firestore (docId first) */
window.deleteItem = async function(key, id){
  const ok = confirm("هل تريد حذف هذا العنصر؟ (سيُحذف من localStorage و Firestore)");
  if (!ok) return;

  const item = (db[key] || []).find(x => x.id === id);

  // Local delete
  db[key] = (db[key] || []).filter(x => x.id !== id);
  localStorage.setItem(key, JSON.stringify(db[key]));
  renderList(key);

  // Firestore delete
  if (!requireFs()) return;

  try{
    if (item?.docId){
      await window.fs.deleteDoc(window.fs.doc(window.fs.db, key, item.docId));
      return;
    }
    const col = window.fs.collection(window.fs.db, key);
    const q = window.fs.query(col, window.fs.where("id","==", id));
    const snap = await window.fs.getDocs(q);
    if (!snap.empty){
      const docId = snap.docs[0].id;
      await window.fs.deleteDoc(window.fs.doc(window.fs.db, key, docId));
    }
  }catch(e){
    console.error(e);
    alert("تم الحذف محليًا، لكن تعذر الحذف من Firestore (قواعد/اتصال).");
  }
};

/* 2) Translation helpers (optional but enabled) */
async function translateText(text, fromLang, toLang){
  const trimmed = (text || "").trim();
  if (!trimmed) return "";

  const maxLen = 500; // مثل كودك السابق [file:193]
  const toSend = trimmed.length > maxLen ? trimmed.slice(0, maxLen) : trimmed;

  const url =
    "https://api.mymemory.translated.net/get?q=" +
    encodeURIComponent(toSend) +
    "&langpair=" + encodeURIComponent(fromLang + "|" + toLang);

  try{
    const res = await fetch(url);
    const data = await res.json();
    return data?.responseData?.translatedText || "";
  }catch(e){
    console.error("Translation error", e);
    return "";
  }
}

function attachAutoTranslateForTriplet(key, fieldBase){
  const frEl = document.getElementById(`${key}-${fieldBase}-fr`);
  const enEl = document.getElementById(`${key}-${fieldBase}-en`);

  // Arabic: for "full" we use editor, others are textarea/input
  const arEl =
    (fieldBase === "full")
      ? document.getElementById(`${key}-full-ar-editor`)
      : document.getElementById(`${key}-${fieldBase}-ar`);

  if (!arEl || !frEl || !enEl) return;

  let timer = null;
  const debounce = 700; // مثل كودك السابق [file:193]

  const readAr = () => (fieldBase === "full" ? (arEl.innerText || "") : (arEl.value || ""));
  const writeAr = (v) => { if (fieldBase === "full") arEl.innerText = v; else arEl.value = v; };

  async function run(source){
    const ar = readAr().trim();
    const fr = (frEl.value || "").trim();
    const en = (enEl.value || "").trim();

    const sourceText = (source === "ar") ? ar : (source === "fr") ? fr : en;
    if (!sourceText) return;

    if (source === "ar"){
      const [tFr, tEn] = await Promise.all([
        translateText(sourceText, "ar", "fr"),
        translateText(sourceText, "ar", "en")
      ]);
      if (tFr) frEl.value = tFr;
      if (tEn) enEl.value = tEn;
    } else if (source === "fr"){
      const [tAr, tEn] = await Promise.all([
        translateText(sourceText, "fr", "ar"),
        translateText(sourceText, "fr", "en")
      ]);
      if (tAr) writeAr(tAr);
      if (tEn) enEl.value = tEn;
    } else {
      const [tAr, tFr] = await Promise.all([
        translateText(sourceText, "en", "ar"),
        translateText(sourceText, "en", "fr")
      ]);
      if (tAr) writeAr(tAr);
      if (tFr) frEl.value = tFr;
    }
  }

  function bind(elm, lang){
    elm.addEventListener("input", ()=>{
      clearTimeout(timer);
      timer = setTimeout(()=> run(lang), debounce);
    });
  }

  bind(arEl, "ar");
  bind(frEl, "fr");
  bind(enEl, "en");
}

/* 3) Hook into showSection AFTER it renders the UI */
const _origShowSection = window.showSection;
window.showSection = function(key){
  _origShowSection(key);

  const cfg = SECTIONS.find(s=>s.key===key);
  if (cfg?.isLive) return;

  // Enable auto-translate for common fields
  attachAutoTranslateForTriplet(key, "title");
  attachAutoTranslateForTriplet(key, "short");
  attachAutoTranslateForTriplet(key, "details");
  attachAutoTranslateForTriplet(key, "full");
};
