<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ofouq Academie - Admin</title>
  <link rel="icon" type="image/png" href="logo1222.jpeg" />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet" />
  <style>
    :root{
      --accent:#0ea5e9;
      --accent2:#22c55e;
      --bg1:#020617;
      --bg2:#0b1120;
      --card:rgba(15,23,42,.86);
      --card2:rgba(15,23,42,.92);
      --text:#e5e7eb;
      --muted:#94a3b8;
      --border:rgba(148,163,184,.26);
      --danger:#ef4444;
      --warn:#f59e0b;
      --shadow:0 18px 45px rgba(15,23,42,.65);
      --r:18px;
      --t:.18s ease;
    }
    *{box-sizing:border-box}
    html,body{width:100%;overflow-x:hidden}
    body{
      margin:0;
      font-family:'Tajawal',sans-serif;
      background:radial-gradient(circle at top left,var(--bg2) 0,var(--bg1) 55%,#000 100%);
      color:var(--text);
      line-height:1.65;
      -webkit-font-smoothing:antialiased;
    }
    .app{
      display:grid;
      min-height:100vh;
      gap:14px;
      padding:14px;
      grid-template-columns:clamp(240px, 25vw, 290px) 1fr;
    }
    .sidebar{
      background:rgba(15,23,42,.74);
      border:1px solid var(--border);
      border-radius:20px;
      box-shadow:var(--shadow);
      padding:16px 14px;
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
      display:flex;
      flex-direction:column;
      overflow:hidden;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      padding-bottom:12px;
      border-bottom:1px dashed rgba(148,163,184,.28);
      margin-bottom:10px;
    }
    .logo{
      width:42px;height:42px;border-radius:14px;
      background:radial-gradient(circle at top,#38bdf8,#0ea5e9);
      display:flex;align-items:center;justify-content:center;
      color:#06101f;font-weight:900;letter-spacing:.03em;
    }
    .brand h1{
      margin:0;
      font-size:13px;
      letter-spacing:.12em;
      text-transform:uppercase;
      color:#cbd5e1;
    }
    .brand p{
      margin:2px 0 0;
      font-size:11px;
      color:#94a3b8;
    }
    .menu{
      flex:1;
      overflow:auto;
      padding-left:2px;
    }
    .menu button{
      width:100%;
      border:0;
      background:transparent;
      color:var(--text);
      text-align:right;
      padding:8px 10px;
      border-radius:999px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      cursor:pointer;
      font-weight:700;
      font-size:13px;
      transition:background var(--t), transform .1s ease, box-shadow var(--t);
      margin-bottom:6px;
    }
    .menu button span{
      display:flex;
      align-items:center;
      gap:8px;
    }
    .menu button:hover{
      background:rgba(15,23,42,.92);
      transform:translateY(-1px);
      box-shadow:0 10px 24px rgba(15,23,42,.7);
    }
    .menu button.active{
      background:rgba(15,23,42,1);
      box-shadow:0 12px 26px rgba(15,23,42,.85);
      border:1px solid rgba(56,189,248,.25);
    }
    .sidebar-footer{
      padding-top:10px;
      border-top:1px dashed rgba(148,163,184,.28);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      flex-wrap:wrap;
      color:#64748b;
      font-size:11px;
    }
    main{
      overflow:auto;
      padding:2px 0 2px 2px;
    }
    .topbar{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
      padding:8px 6px 14px;
    }
    .title{
      display:flex;
      align-items:center;
      gap:10px;
      margin:0;
      color:#e0f2fe;
      font-size:20px;
    }
    .badge{
      width:28px;height:28px;border-radius:999px;
      display:inline-flex;align-items:center;justify-content:center;
      background:rgba(15,23,42,.92);
      border:1px solid rgba(148,163,184,.35);
      color:#7dd3fc;font-size:15px;
    }
    .subtitle{
      margin:4px 0 0;
      font-size:12px;
      color:#64748b;
    }
    .controls{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
    }
    .card{
      background:var(--card);
      border:1px solid rgba(148,163,184,.28);
      border-radius:var(--r);
      box-shadow:var(--shadow);
      padding:14px;
      margin-bottom:12px;
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
    }
    .card h3{
      margin:0 0 10px;
      font-size:15px;
      display:flex;
      align-items:center;
      gap:8px;
      color:var(--text);
    }
    .grid-2{
      display:grid;
      gap:12px;
      grid-template-columns:1.6fr 1fr;
      align-items:start;
    }
    .row{margin-bottom:10px}
    label{
      display:block;
      margin-bottom:4px;
      color:#9ca3af;
      font-weight:800;
      font-size:12px;
    }
    input[type="text"],input[type="url"],input[type="search"],textarea,select{
      width:100%;
      padding:9px 10px;
      border-radius:12px;
      border:1px solid rgba(148,163,184,.45);
      background:rgba(15,23,42,.95);
      color:var(--text);
      outline:none;
      transition:border-color var(--t), box-shadow var(--t), transform var(--t);
      font-size:13px;
      font-family:inherit;
    }
    textarea{
      min-height:80px;
      resize:vertical;
    }
    input:focus,textarea:focus,select:focus{
      border-color:var(--accent);
      box-shadow:0 0 0 1px rgba(56,189,248,.35);
      transform:translateY(-1px);
    }
    input[type="file"]{
      width:100%;
      padding:7px 10px;
      border-radius:12px;
      border:1px solid rgba(148,163,184,.45);
      background:rgba(15,23,42,.95);
      color:var(--muted);
      font-size:12px;
    }
    .editor{
      min-height:130px;
      border-radius:12px;
      border:1px solid rgba(148,163,184,.45);
      padding:10px;
      background:rgba(15,23,42,.95);
      outline:none;
      overflow:auto;
      font-size:13px;
    }
    .preview{
      margin-top:8px;
      font-size:12px;
      color:#93a3b8;
    }
    .preview img{
      width:100%;
      height:160px;
      object-fit:cover;
      border-radius:12px;
      border:1px solid rgba(148,163,184,.3);
      display:block;
      margin-top:8px;
    }
    .actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:10px;
    }
    .list-head{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
      justify-content:space-between;
      margin-bottom:10px;
    }
    .list-head .left{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
    }
    .pill{
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(148,163,184,.35);
      background:rgba(15,23,42,.82);
      color:#cbd5e1;
      font-size:12px;
      font-weight:900;
    }
    .list{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
      gap:10px;
    }
    .item{
      background:var(--card2);
      border:1px solid rgba(148,163,184,.35);
      border-radius:16px;
      overflow:hidden;
      position:relative;
      box-shadow:0 12px 28px rgba(15,23,42,.72);
    }
    .item img{
      width:100%;
      height:120px;
      object-fit:cover;
      display:block;
      border-bottom:1px solid rgba(148,163,184,.25);
    }
    .item-body{padding:10px}
    .item-title{
      margin:0 0 6px;
      font-size:14px;
      color:#e2f3ff;
      font-weight:900;
    }
    .item-desc{
      margin:0 0 8px;
      font-size:12px;
      color:#9ca3af;
      min-height:48px;
    }
    .item-meta{
      font-size:10px;
      color:#94a3b8;
      display:flex;
      justify-content:space-between;
      gap:8px;
      flex-wrap:wrap;
    }
    .item-actions{
      position:absolute;
      top:10px;
      left:10px;
      display:flex;
      gap:8px;
      z-index:10;
    }
    .mini{
      width:36px;
      height:36px;
      display:flex;
      align-items:center;
      justify-content:center;
      border:1px solid rgba(255,255,255,.22);
      border-radius:999px;
      cursor:pointer;
      background:rgba(2,6,23,.92);
      color:#fff;
    }
    .mini.danger{
      color:#fecaca;
      border-color:rgba(239,68,68,.45);
    }
    .empty{
      padding:24px 10px;
      text-align:center;
      color:#6b7280;
      font-size:13px;
      border:1px dashed rgba(148,163,184,.28);
      border-radius:16px;
      background:rgba(15,23,42,.55);
    }
    .status{
      margin-top:8px;
      font-size:12px;
      color:#93c5fd;
      white-space:pre-wrap;
    }
    .hint{
      font-size:11px;
      color:#94a3b8;
      margin-top:4px;
    }
    .chip{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:5px 9px;
      border-radius:999px;
      background:rgba(56,189,248,.14);
      border:1px solid rgba(56,189,248,.25);
      color:#bae6fd;
      font-size:11px;
      margin:4px 4px 0 0;
    }
    .btn{
      border:0;
      border-radius:999px;
      padding:10px 14px;
      cursor:pointer;
      font-weight:800;
      font-size:14px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      transition:transform .12s ease, filter .12s ease, box-shadow .12s ease;
      user-select:none;
      white-space:nowrap;
    }
    .btn-ghost{
      background:rgba(15,23,42,.9);
      border:1px solid rgba(148,163,184,.38);
      color:var(--text);
      box-shadow:0 8px 18px rgba(15,23,42,.6);
      padding:6px 10px;
      font-size:12px;
      font-weight:800;
    }
    .btn-ghost:hover{
      transform:translateY(-1px);
      background:rgba(15,23,42,1);
    }
    .btn-small{
      padding:7px 12px;
      font-size:12px;
      font-weight:900;
    }
    .btn-green{
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      color:#04101f;
      box-shadow:0 12px 26px rgba(34,197,94,.25);
    }
    .btn-red{
      background:linear-gradient(135deg,#ef4444,#dc2626);
      color:#fff;
    }
    @media (max-width:980px){
      .app{grid-template-columns:1fr;padding:12px}
      .sidebar{flex-direction:row;gap:10px;align-items:flex-start}
      .menu{display:flex;gap:8px;overflow:auto;padding:0}
      .menu button{flex:0 0 auto;white-space:nowrap;margin:0}
      .grid-2{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="logo">AD</div>
        <div>
          <h1>ADMIN PANEL</h1>
          <p>Ofouq Academie</p>
        </div>
      </div>

      <nav class="menu" id="menu"></nav>

      <div class="sidebar-footer">
        <span>Firestore + Storage</span>
        <button class="btn btn-ghost" id="logoutBtn" type="button">
          <i class="ri-logout-circle-line"></i>
        </button>
      </div>
    </aside>

    <main>
      <div class="topbar">
        <div>
          <h2 class="title">
            <span class="badge"><i class="ri-layout-row-line"></i></span>
            <span id="sectionTitle">لوحة التحكم</span>
          </h2>
          <div class="subtitle">إضافة، تعديل، حذف، رفع ملفات</div>
        </div>

        <div class="controls">
          <button class="btn btn-ghost btn-small" id="reloadBtn" type="button">
            <i class="ri-refresh-line"></i> تحميل Firestore
          </button>
          <button class="btn btn-ghost btn-small" id="recoverBtn" type="button">
            <i class="ri-history-line"></i> مزامنة
          </button>
          <button class="btn btn-ghost btn-small" id="exportBtn" type="button">
            <i class="ri-download-cloud-2-line"></i> تصدير JSON
          </button>
          <button class="btn btn-ghost btn-small" id="clearBtn" type="button">
            <i class="ri-database-2-line"></i> مسح Local
          </button>
        </div>
      </div>

      <div id="status" class="status"></div>
      <div id="content"></div>
    </main>
  </div>

  <script type="module" src="./firebase-init.js"></script>
  <script type="module" src="./firestore-bridge.js"></script>

  <script type="module">
    import { app, auth } from "./firebase-init.js";
    import { signOut } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";
    import { setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-storage.js";

    const storage = getStorage(app);

    await new Promise((resolve) => {
      if (window.fs && window.fs.db) return resolve();
      window.addEventListener("firestoreReady", resolve, { once: true });
    });

const SECTIONS = [
  { key:"research", title:"أبحاث محكمة", page:"research.html", icon:"ri-file-text-line", kind:"content" },
  { key:"articles", title:"مقالات محكمة", page:"articles.html", icon:"ri-file-paper-line", kind:"content" },
  { key:"files", title:"ملفات بحثية", page:"files.html", icon:"ri-folder-3-line", kind:"content" },
  { key:"articles-foreign", title:"مقالات أجنبية", page:"articles-foreign.html", icon:"ri-article-line", kind:"content" },
  { key:"general-articles", title:"مقالات", page:"general-articles.html", icon:"ri-newspaper-line", kind:"content" },
  { key:"editions", title:"إصداراتنا", page:"editions.html", icon:"ri-book-open-line", kind:"edition" },
  { key:"activities", title:"أنشطتنا", page:"activities.html", icon:"ri-calendar-event-line", kind:"content" },
  { key:"special-politics", title:"تخصص علوم سياسية", page:"special-politics.html", icon:"ri-government-line", kind:"content" },
  { key:"special-ir", title:"تخصص العلاقات الدولية", page:"special-ir.html", icon:"ri-global-line", kind:"content" },
  { key:"special-admin-law", title:"تخصص القانون الإداري", page:"special-admin-law.html", icon:"ri-briefcase-4-line", kind:"content" },
  { key:"special-const-law", title:"تخصص القانون الدستوري", page:"special-const-law.html", icon:"ri-scales-3-line", kind:"content" },
  { key:"special-public-policy", title:"تخصص السياسات العمومية", page:"special-public-policy.html", icon:"ri-community-line", kind:"content" },
  { key:"live", title:"بث مباشر", page:"live.html", icon:"ri-live-line", kind:"live" }
];

    const state = {
      bySection: {},
      currentSectionKey: "editions",
      editing: { key: null, id: null }
    };

    SECTIONS.forEach(s => state.bySection[s.key] = []);

    function el(id){ return document.getElementById(id); }

    function setStatus(msg){
      el("status").textContent = msg || "";
    }

    function esc(s){
      return String(s ?? "")
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;")
        .replace(/'/g,"&#039;");
    }

    function uid(){
      return crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + Math.floor(Math.random() * 99999);
    }

    function safeParse(v, fallback=[]){
      try{
        const x = JSON.parse(v);
        return Array.isArray(x) ? x : fallback;
      }catch{
        return fallback;
      }
    }

    function getByLang(field, lang="ar"){
      if (!field) return "";
      if (typeof field === "string") return field;
      return field[lang] || field.ar || field.fr || field.en || "";
    }

    function stripHtml(html){
      const div = document.createElement("div");
      div.innerHTML = html || "";
      return div.textContent || div.innerText || "";
    }

    function getContentCache(){
      return safeParse(localStorage.getItem("contentcache"), []);
    }

    function setContentCache(items){
      localStorage.setItem("contentcache", JSON.stringify(items));
    }

function normalizeItem(sectionKey, raw){
  const id = String(raw.docId || raw.id || uid());
  return {
    id,
    docId: id,
    section: sectionKey || raw.section || "research",
    type: raw.type || "item",
    title: typeof raw.title === "object" ? raw.title : { ar: raw.title || "", fr:"", en:"" },
    short: typeof raw.short === "object" ? raw.short : { ar: raw.short || "", fr:"", en:"" },
    full: typeof raw.full === "object" ? raw.full : { ar: raw.full || "", fr:"", en:"" },
    details: typeof raw.details === "object" ? raw.details : { ar: raw.details || "", fr:"", en:"" },
    author: typeof raw.author === "object" ? raw.author : { ar: raw.author || "", fr:"", en:"" },
    affiliation: typeof raw.affiliation === "object" ? raw.affiliation : { ar: raw.affiliation || "", fr:"", en:"" },
    date: typeof raw.date === "object" ? raw.date : { ar: raw.date || "", fr:"", en:"" },
    image: raw.image || "",
    imagePath: raw.imagePath || "",
    file: raw.file || raw.link || "",
    filePath: raw.filePath || "",
    editionNumber: Number(raw.editionNumber || 0),
    articles: Array.isArray(raw.articles) ? raw.articles : [],
    createdAt: Number(raw.createdAt || Date.now()),
    updatedAt: Number(raw.updatedAt || raw.createdAt || Date.now()),
    status: raw.status || "published"
  };
}
    function rebuildDbFromCache(){
      const all = getContentCache()
        .map(item => normalizeItem(item.section, item))
        .filter(item => SECTIONS.some(s => s.key === item.section));

      SECTIONS.forEach(s => {
        state.bySection[s.key] = all
          .filter(item => item.section === s.key)
          .sort((a, b) => Number(b.updatedAt || 0) - Number(a.updatedAt || 0));
      });
    }

    function sectionTitle(key){
      const sec = SECTIONS.find(s => s.key === key);
      return sec ? sec.title : "لوحة التحكم";
    }

    function getSectionConfig(key){
      return SECTIONS.find(s => s.key === key);
    }

function getNextEditionNumber(){
  const items = state.bySection.editions || [];
  const numbers = items.map(x => Number(x.editionNumber || 0)).filter(Boolean);
  return numbers.length ? Math.max(...numbers) + 1 : 1;
}

    function buildMenu(){
      const menu = el("menu");
      menu.innerHTML = "";
      SECTIONS.forEach(sec => {
        const b = document.createElement("button");
        b.type = "button";
        b.dataset.key = sec.key;
        b.innerHTML = `<span><i class="${sec.icon}"></i>${esc(sec.title)}</span><i class="ri-arrow-left-s-line"></i>`;
        b.addEventListener("click", () => showSection(sec.key));
        menu.appendChild(b);
      });
    }

    function setActiveMenu(key){
      document.querySelectorAll("#menu button").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.key === key);
      });
    }

function buildEditionForm(key){
  return `
    <div class="card">
      <h3><i class="ri-book-open-line"></i>إضافة عدد جديد</h3>
      <div class="grid-2">
        <div>
          <div class="row">
            <label>رقم العدد</label>
            <input type="text" id="${key}-number-ar" placeholder="1" />
          </div>

          <div class="row">
            <label>عنوان العدد</label>
            <input type="text" id="${key}-title-ar" placeholder="العدد الأول" />
          </div>

          <div class="row">
            <label>وصف العدد</label>
            <textarea id="${key}-short-ar" placeholder="وصف مختصر لهذا العدد"></textarea>
          </div>

          <div class="row">
            <label>صورة الغلاف</label>
            <input type="file" id="${key}-image" accept="image/*" />
          </div>
        </div>

        <div>
          <div class="preview" id="${key}-preview"></div>
        </div>
      </div>

      <div class="card" style="margin-top:14px;padding:12px">
        <h3><i class="ri-file-list-3-line"></i>مقالات العدد</h3>
        <div id="${key}-articles-wrap"></div>

        <div class="actions">
          <button class="btn btn-ghost btn-small" type="button" onclick="addEditionArticleRow('${key}')">
            <i class="ri-add-line"></i>إضافة مقال
          </button>
        </div>
      </div>

      <div class="actions">
        <button class="btn btn-small btn-green" type="button" onclick="publishItem('${key}')">
          <i class="ri-upload-cloud-line"></i>حفظ العدد
        </button>
        <button class="btn btn-ghost btn-small" type="button" onclick="resetForm('${key}')">
          <i class="ri-refresh-line"></i>مسح
        </button>
      </div>
    </div>
  `;
}

    function buildLiveForm(key){
      return `
        <div class="card">
          <h3><i class="ri-live-line"></i>إضافة محتوى مباشر</h3>
          <div class="row">
            <label>العنوان</label>
            <input type="text" id="${key}-title-ar" placeholder="عنوان البث أو الحدث المباشر" />
          </div>
          <div class="row">
            <label>وصف مختصر</label>
            <textarea id="${key}-short-ar" placeholder="وصف مختصر"></textarea>
          </div>
          <div class="row">
            <label>الرابط</label>
            <input type="url" id="${key}-live-link" placeholder="https://..." />
          </div>
          <div class="actions">

    function upsertLocal(sectionKey, obj){
      const all = getContentCache().map(item => normalizeItem(item.section, item));
      const normalized = normalizeItem(sectionKey, { ...obj, section: sectionKey });
      const filtered = all.filter(x => String(x.docId || x.id) !== String(normalized.docId || normalized.id));
      filtered.unshift(normalized);
      setContentCache(filtered);
      rebuildDbFromCache();
    }

    async function upsertFirestore(sectionKey, obj){
      const now = Date.now();
      const docIdValue = String(obj.docId || obj.id || uid());
      obj.id = docIdValue;
      obj.docId = docIdValue;
      obj.section = sectionKey;
      obj.updatedAt = now;
      if (!obj.createdAt) obj.createdAt = now;
      if (!obj.status) obj.status = "published";
      await setDoc(window.fs.doc(window.fs.db, "content", docIdValue), obj, { merge: true });
      return obj;
    }

    async function recoverAllData(){
      setStatus("جاري المزامنة بين Firestore و Local...");
      let firestoreItems = [];
      let localItems = [];

      try {
        const snap = await window.fs.getDocs(window.fs.collection(window.fs.db, "content"));
        snap.forEach(docSnap => {
          const raw = { docId: docSnap.id, ...docSnap.data() };
          firestoreItems.push(normalizeItem(raw.section, raw));
        });
      } catch (e) {
        console.error("Firestore load error:", e);
      }

      try {
        localItems = getContentCache().map(item => normalizeItem(item.section, item));
      } catch (e) {
        console.error("Local cache error:", e);
      }

      const mergedMap = new Map();
      [...localItems, ...firestoreItems].forEach(item => {
        const id = String(item.docId || item.id || uid());
        const existing = mergedMap.get(id);
        if (!existing) {
          mergedMap.set(id, item);
          return;
        }
        if (Number(item.updatedAt || 0) >= Number(existing.updatedAt || 0)) {
          mergedMap.set(id, item);
        }
      });

      const merged = Array.from(mergedMap.values());
      setContentCache(merged);
      rebuildDbFromCache();
      showSection(state.currentSectionKey);
      setStatus(`تمت المزامنة: ${merged.length} عنصر`);
    }

      const a = document.createElement("a");
      a.href = url;
      a.download = `site-data-${new Date().toISOString().slice(0,10)}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function clearLocalStorageOnly(){
      const ok = confirm("هل تريد مسح التخزين المحلي فقط؟");
      if (!ok) return;
      localStorage.removeItem("contentcache");
      SECTIONS.forEach(s => state.bySection[s.key] = []);
      showSection(state.currentSectionKey);
      setStatus("تم مسح localStorage");
    }

    async function init(){
      buildMenu();
      rebuildDbFromCache();
      showSection(state.currentSectionKey);
      await recoverAllData();

      el("reloadBtn").addEventListener("click", reloadFromFirestore);
      el("recoverBtn").addEventListener("click", recoverAllData);
      el("exportBtn").addEventListener("click", exportJSON);
      el("clearBtn").addEventListener("click", clearLocalStorageOnly);
      el("logoutBtn").addEventListener("click", async () => {
        try { await signOut(auth); } catch {}
        location.reload();
      });
    }


window.addEditionArticleRow = addEditionArticleRow;
window.publishItem = saveItem;
window.resetForm = resetForm;
window.loadForEdit = loadForEdit;
window.deleteItem = deleteItemById;
window.showSection = showSection;

init();
  </script>
</body>
