<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title id="pageTitle">Article</title>
  <link rel="icon" type="image/png" href="logo1222.jpeg">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#f6fbff;--card:#ffffff;--text:#18323e;--muted:#667784;--primary:#009bc4;--primary2:#00667f;--border:#d9e5ea;--shadow:0 10px 30px rgba(15,23,42,.08)}
    *{box-sizing:border-box} html,body{margin:0;padding:0;width:100%;overflow-x:hidden}
    body{font-family:'Tajawal',sans-serif;background:linear-gradient(180deg,#fff,var(--bg));color:var(--text);line-height:1.8}
    a{color:var(--primary);text-decoration:none} img{max-width:100%;display:block}
    header{position:sticky;top:0;z-index:10;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
    .wrap{max-width:1000px;margin:auto;padding:14px 16px}
    .top{display:flex;align-items:center;justify-content:space-between;gap:12px}
    .brand{display:flex;align-items:center;gap:10px}
    .brand img{width:44px;height:44px;object-fit:contain;border-radius:10px;background:#fff}
    .btn{border:1px solid var(--border);background:#fff;color:var(--text);padding:10px 14px;border-radius:14px;font-weight:700;cursor:pointer}
    .btn.primary{background:linear-gradient(135deg,var(--primary),var(--primary2));border:none;color:#fff}
    main{max-width:1000px;margin:auto;padding:18px 16px 40px}
    .hero{background:var(--card);border:1px solid var(--border);border-radius:22px;box-shadow:var(--shadow);overflow:hidden}
    .cover{width:100%;aspect-ratio:16/9;background:#eef5f8;object-fit:cover}
    .content{padding:18px}
    .meta{display:flex;flex-wrap:wrap;gap:8px;color:var(--muted);font-size:13px;margin-bottom:10px}
    h1{margin:0 0 10px;font-size:clamp(24px,5vw,40px);line-height:1.3}
    .excerpt{font-size:18px;color:#27424f;margin:0 0 16px}
    .body{font-size:17px}
    .body p{margin:0 0 12px}
    .body img{margin:16px 0;border-radius:18px;border:1px solid var(--border)}
    .fileBox{margin-top:18px;padding:14px;border:1px solid var(--border);border-radius:18px;background:#fafdff}
    .error{max-width:760px;margin:40px auto;padding:18px;border:1px dashed #f0a0a0;background:#fff5f5;color:#8a2a2a;border-radius:16px;text-align:center}
    .loading{max-width:760px;margin:40px auto;padding:18px;border:1px dashed var(--border);background:#fff;border-radius:16px;text-align:center;color:var(--muted)}
    footer{padding:24px 16px 36px;text-align:center;color:var(--muted);font-size:13px}
  </style>
</head>
<body>
  <header>
    <div class="wrap top">
      <div class="brand">
        <img src="logo1222.jpeg" alt="Ofouq Academy">
        <div>
          <strong>Ofouq Academie</strong><br>
          <span>Scientific platform</span>
        </div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end">
        <button class="btn" onclick="history.back()">Back</button>
        <a class="btn primary" href="index.html">Home</a>
      </div>
    </div>
  </header>

  <main>
    <div id="state" class="loading">Loading article...</div>

    <article id="article" class="hero" hidden>
      <img id="cover" class="cover" alt="cover" hidden>
      <div class="content">
        <div id="meta" class="meta"></div>
        <h1 id="title"></h1>
        <p id="excerpt" class="excerpt"></p>
        <div id="body" class="body"></div>
        <div id="fileBox" class="fileBox" hidden></div>
      </div>
    </article>
  </main>

  <footer>Ofouq Academie</footer>

  <script type="module" src="firestore-bridge.js"></script>
  <script>
    const lang = (localStorage.getItem('lang') || 'ar').toLowerCase();
    const params = new URLSearchParams(location.search);
    const id = params.get('id');

    const byLang = (field) => {
      if (!field) return '';
      if (typeof field === 'string') return field;
      return field[lang] || field.ar || field.fr || field.en || '';
    };

    function setError(msg) {
      const state = document.getElementById('state');
      state.className = 'error';
      state.textContent = msg;
    }

    function setMeta(article) {
      const parts = [];
      const date = byLang(article.date);
      const author = byLang(article.author);
      if (date) parts.push(date);
      if (author) parts.push(author);
      if (article.section) parts.push(article.section);

      document.getElementById('meta').textContent = parts.join(' • ');
      document.title = byLang(article.title) || 'Article';
      document.getElementById('pageTitle').textContent = document.title;
    }

    function renderArticle(article) {
      setMeta(article);

      const title = byLang(article.title);
      const short = byLang(article.short || article.summary || '');
      const full = byLang(article.full || article.content || article.details || '');

      document.getElementById('title').textContent = title || 'Untitled';
      document.getElementById('excerpt').textContent = short;
      document.getElementById('body').innerHTML = full || '<p>No content available.</p>';

      const cover = document.getElementById('cover');
      if (article.image) {
        cover.src = article.image;
        cover.hidden = false;
      }

      const fileBox = document.getElementById('fileBox');
      if (article.file) {
        fileBox.hidden = false;
        fileBox.innerHTML = `<strong>Attachment:</strong> <a href="${article.file}" target="_blank" rel="noopener">Open file</a>`;
      }

      document.getElementById('state').hidden = true;
      document.getElementById('article').hidden = false;
    }

    async function waitForFS(timeoutMs = 8000) {
      return new Promise((resolve, reject) => {
        const start = Date.now();
        function check() {
          if (window.fs && window.fs.db && window.fs.doc && window.fs.getDoc && window.fs.getDocs && window.fs.collection && window.fs.query && window.fs.where) {
            return resolve();
          }
          if (Date.now() - start > timeoutMs) {
            return reject(new Error('Firestore bridge not ready'));
          }
          setTimeout(check, 60);
        }
        check();
      });
    }

    async function loadFromFirestoreByDocId(docId) {
      const ref = window.fs.doc(window.fs.db, 'content', String(docId));
      const snap = await window.fs.getDoc(ref);
      if (snap && typeof snap.exists === 'function' && snap.exists()) {
        return { docId: snap.id, ...snap.data() };
      }
      return null;
    }

    async function loadFromFirestoreByInternalId(internalId) {
      const col = window.fs.collection(window.fs.db, 'content');
      const q = window.fs.query(col, window.fs.where('id', '==', String(internalId)));
      const snap = await window.fs.getDocs(q);

      if (snap && !snap.empty) {
        const docSnap = snap.docs[0];
        return { docId: docSnap.id, ...docSnap.data() };
      }
      return null;
    }

    function loadFromCache(anyId) {
      try {
        const cached = JSON.parse(localStorage.getItem('content_cache') || '[]');
        return cached.find(x =>
          String(x.docId) === String(anyId) ||
          String(x.id) === String(anyId)
        ) || null;
      } catch (e) {
        return null;
      }
    }

    async function loadArticle() {
      if (!id) {
        setError('No article id in the link.');
        return;
      }

      const cached = loadFromCache(id);
      if (cached) {
        renderArticle(cached);
        return;
      }

      try {
        await waitForFS();

        let article = await loadFromFirestoreByDocId(id);

        if (!article) {
          article = await loadFromFirestoreByInternalId(id);
        }

        if (!article) {
          setError('No article found.');
          return;
        }

        renderArticle(article);
      } catch (e) {
        console.error(e);
        setError('No article found.');
      }
    }

    loadArticle();
  </script>
</body>
</html>
