<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title id="pageTitle">Article</title>
  <link rel="icon" type="image/png" href="logo1222.jpeg">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#f6fbff;--card:#ffffff;--text:#18323e;--muted:#667784;--primary:#009bc4;--primary2:#00667f;--border:#d9e5ea;--shadow:0 10px 30px rgba(15,23,42,.08)}
    *{box-sizing:border-box} html,body{margin:0;padding:0;width:100%;overflow-x:hidden}
    body{font-family:'Tajawal',sans-serif;background:linear-gradient(180deg,#fff,var(--bg));color:var(--text);line-height:1.8}
    a{color:var(--primary);text-decoration:none} img{max-width:100%;display:block}
    header{position:sticky;top:0;z-index:10;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
    .wrap{max-width:1000px;margin:auto;padding:14px 16px}
    .top{display:flex;align-items:center;justify-content:space-between;gap:12px}
    .brand{display:flex;align-items:center;gap:10px}
    .brand img{width:44px;height:44px;object-fit:contain;border-radius:10px;background:#fff}
    .btn{border:1px solid var(--border);background:#fff;color:var(--text);padding:10px 14px;border-radius:14px;font-weight:700;cursor:pointer}
    .btn.primary{background:linear-gradient(135deg,var(--primary),var(--primary2));border:none;color:#fff}
    main{max-width:1000px;margin:auto;padding:18px 16px 40px}
    .hero{background:var(--card);border:1px solid var(--border);border-radius:22px;box-shadow:var(--shadow);overflow:hidden}
    .cover{width:100%;aspect-ratio:16/9;background:#eef5f8;object-fit:cover}
    .content{padding:18px}
    .meta{display:flex;flex-wrap:wrap;gap:8px;color:var(--muted);font-size:13px;margin-bottom:10px}
    h1{margin:0 0 10px;font-size:clamp(24px,5vw,40px);line-height:1.3}
    .excerpt{font-size:18px;color:#27424f;margin:0 0 16px}
    .body{font-size:17px}
    .body p{margin:0 0 12px}
    .body img{margin:16px 0;border-radius:18px;border:1px solid var(--border)}
    .fileBox{margin-top:18px;padding:14px;border:1px solid var(--border);border-radius:18px;background:#fafdff}
    .error{max-width:760px;margin:40px auto;padding:18px;border:1px dashed #f0a0a0;background:#fff5f5;color:#8a2a2a;border-radius:16px;text-align:center}
    .loading{max-width:760px;margin:40px auto;padding:18px;border:1px dashed var(--border);background:#fff;border-radius:16px;text-align:center;color:var(--muted)}
    footer{padding:24px 16px 36px;text-align:center;color:var(--muted);font-size:13px}
  </style>
</head>
<body>
  <header>
    <div class="wrap top">
      <div class="brand">
        <img src="logo1222.jpeg" alt="Ofouq Academy">
        <div>
          <strong>Ofouq Academie</strong><br>
          <span>Scientific platform</span>
        </div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end">
        <button class="btn" onclick="history.back()">Back</button>
        <a class="btn primary" href="index.html">Home</a>
      </div>
    </div>
  </header>

  <main>
    <div id="state" class="loading">Loading article...</div>

    <article id="article" class="hero" hidden>
      <img id="cover" class="cover" alt="cover" hidden>
      <div class="content">
        <div id="meta" class="meta"></div>
        <h1 id="title"></h1>
        <p id="excerpt" class="excerpt"></p>
        <div id="body" class="body"></div>
        <div id="fileBox" class="fileBox" hidden></div>
      </div>
    </article>
  </main>

  <footer>Ofouq Academie</footer>

<script type="module" src="firestore-bridge.js"></script>
<script>
  function getStoredUser() {
    try {
      return JSON.parse(localStorage.getItem('user') || sessionStorage.getItem('user') || 'null');
    } catch {
      return null;
    }
  }

  let user = getStoredUser();
  let currentLang = localStorage.getItem('lang') || 'ar';

  const translations = {
    ar: {
      title: 'المقالات المحكمة',
      noarticlespeer: 'لا توجد مقالات بعد',
      byauthor: 'بقلم',
      sourcelabel: 'المصدر',
      peerbadge: 'مقال محكم',
      unknowndate: 'غير محدد'
    },
    en: {
      title: 'Peer-reviewed articles',
      noarticlespeer: 'No articles yet',
      byauthor: 'By',
      sourcelabel: 'Source',
      peerbadge: 'Peer-reviewed',
      unknowndate: 'Unspecified'
    },
    fr: {
      title: 'Articles évalués',
      noarticlespeer: 'Aucun article pour le moment',
      byauthor: 'Par',
      sourcelabel: 'Source',
      peerbadge: 'Évalué',
      unknowndate: 'Non précisé'
    }
  };

  function t(key) {
    return (translations[currentLang] || translations.ar)[key] || key;
  }

  function getTextByLang(field, lang = currentLang) {
    if (!field) return '';
    if (typeof field === 'string') return field;
    return field?.[lang] ?? field?.ar ?? field?.fr ?? field?.en ?? '';
  }

  function setLang(lang) {
    currentLang = lang;
    localStorage.setItem('lang', lang);
    document.documentElement.lang = lang;
    document.documentElement.dir = (lang === 'en' || lang === 'fr') ? 'ltr' : 'rtl';
    const titleEl = document.getElementById('t-title');
    if (titleEl) titleEl.textContent = t('title');
    renderArticlesPeer();
  }

  async function waitForFS(timeoutMs = 8000) {
    return new Promise((resolve, reject) => {
      const start = Date.now();
      function check() {
        if (window.fs && window.fs.db && window.fs.collection && window.fs.getDocs) return resolve();
        if (Date.now() - start > timeoutMs) return reject(new Error('Firestore not ready'));
        setTimeout(check, 60);
      }
      check();
    });
  }

  async function syncArticlesFromFirestore() {
    try {
      await waitForFS();

      const all = [];

      try {
        const contentCol = window.fs.collection(window.fs.db, 'content');
        const contentSnap = await window.fs.getDocs(contentCol);

        contentSnap.forEach(docSnap => {
          const data = docSnap.data() || {};
          const item = {
            docId: docSnap.id,
            ...data
          };

          const looksLikeArticle =
            item.section === 'articles' ||
            item.type === 'article' ||
            item.category === 'articles' ||
            !!item.title;

          if (looksLikeArticle) {
            all.push(item);
          }
        });
      } catch (e) {
        console.error('Content collection load failed:', e);
      }

      try {
        const oldCol = window.fs.collection(window.fs.db, 'articles');
        const oldSnap = await window.fs.getDocs(oldCol);

        oldSnap.forEach(docSnap => {
          const data = docSnap.data() || {};
          const item = {
            docId: docSnap.id,
            ...data,
            section: data.section || 'articles'
          };

          const exists = all.some(x =>
            String(x.docId) === String(item.docId) ||
            (x.id != null && item.id != null && String(x.id) === String(item.id))
          );

          if (!exists) all.push(item);
        });
      } catch (e) {
        console.error('Old articles collection load failed:', e);
      }

      all.sort((a, b) =>
        Number(b.updatedAt || b.createdAt || b.id || 0) -
        Number(a.updatedAt || a.createdAt || a.id || 0)
      );

      localStorage.setItem('articles', JSON.stringify(all));
      console.log('SYNCED ARTICLES:', all);
      renderArticlesPeer();
    } catch (error) {
      console.error('Articles sync failed:', error);
      renderArticlesPeer();
    }
  }

  const articlesPeerGrid = document.getElementById('articlesPeerGrid');

  function renderArticlesPeer() {
    if (!articlesPeerGrid) return;

    let articlesData = [];
    try {
      articlesData = JSON.parse(localStorage.getItem('articles') || '[]');
    } catch (e) {
      articlesData = [];
    }

    articlesPeerGrid.innerHTML = '';

    if (!Array.isArray(articlesData) || articlesData.length === 0) {
      articlesPeerGrid.innerHTML = `<div class="empty-state">${t('noarticlespeer')}</div>`;
      return;
    }

    articlesData.forEach(item => {
      const card = document.createElement('article');
      card.className = 'card';

      if (item.id != null) card.dataset.id = item.id;
      if (item.docId != null) card.dataset.docId = item.docId;

      const title = getTextByLang(item.title) || 'Untitled';
      const authorName = getTextByLang(item.author);
      const date = getTextByLang(item.date) || t('unknowndate');
      const source = getTextByLang(item.journal || item.source);
      const img = item.image || '';
      const descRaw =
        getTextByLang(item.shortContent) ||
        getTextByLang(item.short) ||
        getTextByLang(item.summary) ||
        getTextByLang(item.description) ||
        '';
      const desc = descRaw.length > 220 ? descRaw.slice(0, 220) + '...' : descRaw;
      const authorPart = authorName ? `${t('byauthor')} ${authorName}` : '';
      const meta = [authorPart, date].filter(Boolean).join(' • ');

      card.innerHTML = `
        ${img ? `<div class="card-img-wrapper"><img src="${img}" class="card-img" alt="${title}" loading="lazy"></div>` : ''}
        <div class="card-body">
          <h3>${title}</h3>
          <div class="meta">${meta}</div>
          ${source ? `<div class="source">${t('sourcelabel')}: ${source}</div>` : ''}
          <p>${desc}</p>
        </div>
        <div class="card-footer">
          <span>${t('peerbadge')}</span>
        </div>
      `;

      articlesPeerGrid.appendChild(card);
    });
  }

  function handleProtectedArticle(id, docId) {
    const finalId = docId || id;
    if (!finalId) return;
    window.location.href = `articles-view.html?id=${encodeURIComponent(finalId)}`;
  }

  document.addEventListener('click', e => {
    const card = e.target.closest('.card');
    if (!card) return;

    const id = card.dataset.id;
    const docId = card.dataset.docId;

    if (!id && !docId) return;
    handleProtectedArticle(id, docId);
  });

  window.addEventListener('DOMContentLoaded', async () => {
    renderArticlesPeer();
    await syncArticlesFromFirestore();
    setLang(currentLang);
  });
</script>
</body>
</html>
